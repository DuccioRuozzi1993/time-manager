function parseDate(str) {
  if (!str) return null;
  var p = str.split("-");
  return p.length === 3 ? new Date(+p[0], +p[1]-1, +p[2]) : null;
}
function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a, b) { return Math.round((b - a) / 86400000); }

function GanttView({ tasks, onSelect }) {
  const C = useContext(ThemeCtx);
  const [offset, setOffset] = useState(0);

  const WEEKS = 12;
  const LABEL_W = 180;
  const BAR_H = 20;
  const ROW_H = 46;
  const HEAD_H = 32;
  const SUBH_H = 22;

  function fmtShort(d) { return d.toLocaleDateString("it-IT", { day:"numeric", month:"short" }); }
  function fmtMonth(d) { return d.toLocaleDateString("it-IT", { month:"long" }); }

  const todayD = parseDate(today);
  const winStart = addDays(todayD, offset * 7 - 28);
  const winEnd = addDays(winStart, WEEKS * 7);
  const totalDays = WEEKS * 7;

  // split projects
  const planned = [], unplanned = [];
  tasks.forEach(function(t) {
    if (t.type !== "project" || t.progress === 100) return;
    let s = parseDate(t.start), e = parseDate(t.end);
    if (s && e && e >= s) planned.push(t);
    else unplanned.push(t);
  });
  planned.sort(function(a,b){ return parseDate(a.start) - parseDate(b.start); });

  // ── month / week markers ──
  const months = [];
  let mc = new Date(winStart.getFullYear(), winStart.getMonth(), 1);
  while (mc <= winEnd) {
    const pct = diffDays(winStart, mc) / totalDays * 100;
    if (pct < 100) months.push({ pct: Math.max(0, pct), label: fmtMonth(mc) });
    mc = new Date(mc.getFullYear(), mc.getMonth()+1, 1);
  }

  const weeks = [];
  let wc = new Date(winStart);
  const wd = wc.getDay();
  wc = addDays(wc, wd === 1 ? 0 : wd === 0 ? 1 : 8 - wd);
  while (wc <= winEnd) {
    const wp = diffDays(winStart, wc) / totalDays * 100;
    if (wp >= 0 && wp <= 100) weeks.push({ pct: wp, label: fmtShort(wc) });
    wc = addDays(wc, 7);
  }

  const todayPct = diffDays(winStart, todayD) / totalDays * 100;
  const showToday = todayPct >= 0 && todayPct <= 100;

  const sep = "1px solid " + C.sep;

  // ── bar geometry from a task ──
  function barGeom(task) {
    let s = parseDate(task.start);
    let e = parseDate(task.end);
    const pctS = diffDays(winStart, s) / totalDays * 100;
    const pctE = diffDays(winStart, addDays(e, 1)) / totalDays * 100;
    const left = Math.max(0, pctS);
    const right = Math.min(100, pctE);
    return { left: left, width: Math.max(0.5, right - left), clipped: pctS < 0 || pctE > 100 };
  }

  return (
    <div style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>

      {/* Controls */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        <button onClick={() => setOffset(o => o-2)}
          style={{ background:C.s2, border:"none", borderRadius:8, width:30, height:30, cursor:"pointer", color:C.l2, fontSize:17, lineHeight:1, fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
        <button onClick={() => setOffset(0)}
          style={{ background: offset===0 ? `${C.blue}22` : C.s2, border:"none", borderRadius:8, padding:"5px 14px", cursor:"pointer", color: offset===0 ? C.blue : C.l2, fontSize:12, fontWeight:600, fontFamily:"inherit" }}>Oggi</button>
        <button onClick={() => setOffset(o => o+2)}
          style={{ background:C.s2, border:"none", borderRadius:8, width:30, height:30, cursor:"pointer", color:C.l2, fontSize:17, lineHeight:1, fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
        <span style={{ fontSize:12, color:C.l3 }}>{fmtShort(winStart)} → {fmtShort(winEnd)}</span>
      </div>

      {/* Timeline table */}
      {planned.length > 0 && (
        <div style={card(C)}>

          {/* Month row */}
          <div style={{ display:"flex", borderBottom:sep, height:HEAD_H }}>
            <div style={{ width:LABEL_W, flexShrink:0, display:"flex", alignItems:"center", paddingLeft:14 }}>
              <span style={{ fontSize:10, fontWeight:700, color:C.l3, letterSpacing:0.8 }}>PROGETTO</span>
            </div>
            <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
              {months.map(function(m,i){
                return (
                  <div key={i} style={{ position:"absolute", left:m.pct+"%", top:0, bottom:0, borderLeft:`1px solid ${C.sep}` }}>
                    <span style={{ position:"absolute", top:7, left:6, fontSize:10, fontWeight:700, color:C.l2, whiteSpace:"nowrap" }}>{m.label}</span>
                  </div>
                );
              })}
              {showToday && <div style={{ position:"absolute", left:todayPct+"%", top:0, bottom:0, width:2, background:C.red, opacity:0.85, transform:"translateX(-50%)", zIndex:2 }} />}
            </div>
          </div>

          {/* Week row */}
          <div style={{ display:"flex", borderBottom:sep, height:SUBH_H }}>
            <div style={{ width:LABEL_W, flexShrink:0 }} />
            <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
              {weeks.map(function(wk,i){
                return (
                  <div key={i} style={{ position:"absolute", left:wk.pct+"%", top:0, bottom:0 }}>
                    <div style={{ position:"absolute", top:0, left:0, width:1, bottom:0, background:C.sep, opacity:0.6 }} />
                    <span style={{ position:"absolute", top:4, left:4, fontSize:9, color:C.l3, whiteSpace:"nowrap" }}>{wk.label}</span>
                  </div>
                );
              })}
              {showToday && <div style={{ position:"absolute", left:todayPct+"%", top:0, bottom:0, width:2, background:C.red, opacity:0.85, transform:"translateX(-50%)", zIndex:2 }} />}
            </div>
          </div>

          {/* Project rows */}
          {planned.map(function(task, idx){
            const g = barGeom(task);
            const prog = task.progress || 0;
            const daysLeft = diffDays(todayD, parseDate(task.end));
            const isLate = daysLeft < 0 && prog < 100;

            return (
              <div key={task.id}
                style={{ display:"flex", alignItems:"stretch", borderBottom: idx < planned.length-1 ? sep : "none", cursor:"pointer", transition:"background 0.12s" }}
                onMouseEnter={function(ev){ ev.currentTarget.style.background = C.s2; }}
                onMouseLeave={function(ev){ ev.currentTarget.style.background = ""; }}
                onClick={() => onSelect(task.id)}>

                {/* Label */}
                <div style={{ width:LABEL_W, flexShrink:0, padding:"0 14px", display:"flex", flexDirection:"column", justifyContent:"center", minHeight:ROW_H }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:task.color, flexShrink:0 }} />
                    <span style={{ fontSize:12, fontWeight:600, color: isLate ? C.red : C.l1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{task.title}</span>
                  </div>
                  <div style={{ fontSize:10, color: isLate ? C.red : C.l3, paddingLeft:13 }}>
                    {isLate
                      ? "ritardo "+Math.abs(daysLeft)+"g"
                      : prog > 0
                        ? prog+"%"
                        : daysLeft+"g rimanenti"
                    }
                  </div>
                </div>

                {/* Bar canvas */}
                <div style={{ flex:1, position:"relative", minHeight:ROW_H, overflow:"hidden" }}>
                  {/* Grid lines */}
                  {weeks.map(function(wk,i){
                    return <div key={i} style={{ position:"absolute", left:wk.pct+"%", top:0, bottom:0, width:1, background:C.sep, opacity:0.35 }} />;
                  })}

                  {/* Today */}
                  {showToday && <div style={{ position:"absolute", left:todayPct+"%", top:0, bottom:0, width:2, background:C.red, opacity:0.7, transform:"translateX(-50%)", zIndex:3 }} />}

                  {/* Bar background */}
                  <div style={{
                    position:"absolute",
                    left:   g.left + "%",
                    width:  g.width + "%",
                    top:    "50%",
                    height: BAR_H,
                    marginTop: -(BAR_H/2),
                    borderRadius: 6,
                    background: task.color + "40",
                    border: "2px solid " + task.color + "90",
                    overflow:"hidden",
                    boxSizing:"border-box"
                  }}>
                    {/* Progress fill */}
                    {prog > 0 && (
                      <div style={{ width:prog+"%", height:"100%", background:task.color, borderRadius:4, opacity:0.85 }} />
                    )}
                  </div>

                  {/* % label */}
                  {prog > 0 && g.width > 8 && (
                    <div style={{ position:"absolute", left:g.left+"%", width:g.width+"%", top:"50%", height:BAR_H, marginTop:-(BAR_H/2), display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none", zIndex:4 }}>
                      <span style={{ fontSize:9, fontWeight:800, color:"#fff", textShadow:"0 1px 3px rgba(0,0,0,0.6)" }}>{prog}%</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

        </div>
      )}

      {/* Unplanned projects */}
      {unplanned.length > 0 && (
        <div style={{ marginTop:24 }}>
          <div style={{ fontSize:10, fontWeight:700, color:C.l3, letterSpacing:1, marginBottom:8 }}>SENZA DATE</div>
          <div style={card(C)}>
            {unplanned.map(function(task,idx){
              return (
                <div key={task.id}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 16px", borderBottom: idx < unplanned.length-1 ? sep : "none", cursor:"pointer" }}
                  onClick={() => onSelect(task.id)}
                  onMouseEnter={function(ev){ ev.currentTarget.style.background = C.s2; }}
                  onMouseLeave={function(ev){ ev.currentTarget.style.background = ""; }}>
                  <div style={{ width:6, height:6, borderRadius:"50%", background:task.color, flexShrink:0 }} />
                  <span style={{ fontSize:13, color:C.l2 }}>{task.title}</span>
                  <span style={{ fontSize:11, color:C.l3, marginLeft:"auto" }}>Aggiungi date di inizio e fine per visualizzare</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {planned.length === 0 && unplanned.length === 0 && (
        <div style={{ textAlign:"center", padding:"80px 0", color:C.l3 }}>
          <div style={{ fontSize:30, marginBottom:12 }}>✦</div>
          <div style={{ fontSize:15 }}>Nessun progetto attivo. Crea un task di tipo Progetto con date di inizio e fine.</div>
        </div>
      )}
    </div>
  );
}

// ── Saved indicator ──
function SavedIndicator({ savedAt }) {
  const C = useContext(ThemeCtx);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    if (!savedAt) return;
    setVisible(true);
    const t = setTimeout(() => setVisible(false), 2000);
    return function() { clearTimeout(t); };
  }, [savedAt]);

  return (
    <span style={{
      fontSize:11, color:C.teal, fontWeight:500,
      opacity: visible ? 1 : 0,
      transition: visible ? "opacity 0.15s" : "opacity 0.6s",
      pointerEvents:"none", userSelect:"none", whiteSpace:"nowrap"
    }}>
      · salvato
    </span>
  );
}

function App() {
  // ── Persistence: load from localStorage on first render ──
  const [tasks, setTasks] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) return JSON.parse(raw).map(normalizeTask);
    } catch(e) {}
    return [];
  });

  const [trash, setTrash] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_TRASH);
      if (raw) return JSON.parse(raw).map(normalizeTask);
    } catch(e) {}
    return [];
  });

  const [attTrash, setAttTrash] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_ATT_TRASH);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return [];
  });

  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem(LS_THEME) !== "light"; } catch(e) { return true; }
  });

  const [savedAt, setSavedAt] = useState(null);
  const [busyHours, setBusyHours] = useState(function() {
    try {
      var raw = localStorage.getItem(LS_BUSY + "_" + today);
      return raw !== null ? parseFloat(raw) : 0;
    } catch(e) { return 0; }
  });
  useEffect(function() {
    try { localStorage.setItem(LS_BUSY + "_" + today, String(busyHours)); } catch(e) {}
  }, [busyHours]);

  // ── Persistence: save to localStorage on every change ──
  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(tasks)); setSavedAt(Date.now()); } catch(e) {}
  }, [tasks]);

  useEffect(() => {
    try { localStorage.setItem(LS_TRASH, JSON.stringify(trash)); setSavedAt(Date.now()); } catch(e) {}
  }, [trash]);

  useEffect(() => {
    try { localStorage.setItem(LS_ATT_TRASH, JSON.stringify(attTrash)); setSavedAt(Date.now()); } catch(e) {}
  }, [attTrash]);

  useEffect(() => {
    try { localStorage.setItem(LS_THEME, isDark ? "dark" : "light"); } catch(e) {}
  }, [isDark]);

  const [sel, setSel]           = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [showReview, setShowReview] = useState(false);
  const [showTrash, setShowTrash]   = useState(false);
  const [viewMode, setViewMode]     = useState("agenda"); // "agenda" | "gantt"
  const [query, setQuery]           = useState("");
  const searchRef = useRef(null);
  const importRef = useRef(null);

  const C = isDark ? DARK : LIGHT;

  // ── Trash mutators ──
  const moveToTrash = id => {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    setTrash(tr => [...tr, { ...t, deletedAt: new Date().toISOString() }]);
    setTasks(ts => ts.filter(t => t.id !== id));
    setSel(null);
  };
  const trashAll = ids => {
    const now = new Date().toISOString();
    const toMove = tasks.filter(t => ids.includes(t.id));
    setTrash(tr => [...tr, ...toMove.map(t => ({ ...t, deletedAt: now }))]);
    setTasks(ts => ts.filter(t => !ids.includes(t.id)));
  };
  const restoreFromTrash = id => {
    const t = trash.find(t => t.id === id);
    if (!t) return;
    const { deletedAt, ...restored } = t;
    setTasks(ts => [...ts, restored]);
    setTrash(tr => tr.filter(t => t.id !== id));
  };
  const deleteFromTrash = id => {
    const t = trash.find(t => t.id === id);
    if (t) (t.attachments || []).forEach(a => idbDelete(a.id));
    setTrash(tr => tr.filter(t => t.id !== id));
  };
  const emptyTrash = () => {
    trash.forEach(t => (t.attachments || []).forEach(a => idbDelete(a.id)));
    attTrash.forEach(a => idbDelete(a.id));
    setTrash([]);
    setAttTrash([]);
  };

  // ── Attachment trash mutators ──
  const trashAttachment = (taskId, taskTitle, meta) => {
    setTasks(ts => ts.map(t => t.id === taskId
      ? { ...t, attachments: t.attachments.filter(a => a.id !== meta.id) }
      : t
    ));
    setAttTrash(at => [...at, { ...meta, taskId, taskTitle, deletedAt: new Date().toISOString() }]);
  };
  const restoreAttachment = id => {
    const att = attTrash.find(a => a.id === id);
    if (!att) return;
    const { taskId, taskTitle, deletedAt, ...meta } = att;
    setTasks(ts => ts.map(t => t.id === taskId
      ? { ...t, attachments: [...(t.attachments || []), meta] }
      : t
    ));
    setAttTrash(at => at.filter(a => a.id !== id));
  };
  const deleteAttachment = id => {
    idbDelete(id);
    setAttTrash(at => at.filter(a => a.id !== id));
  };

  // ── Export / Import ──
  function exportJSON() {
    const blob = new Blob([JSON.stringify({ tasks, trash }, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `time-manager-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        // Support both old format (array) and new format ({tasks, trash})
        const newTasks = Array.isArray(parsed) ? parsed : (parsed.tasks || []);
        const newTrash = Array.isArray(parsed) ? [] : (parsed.trash || []);
        if (!Array.isArray(newTasks)) throw new Error("Formato non valido");
        setTasks(newTasks.map(normalizeTask));
        setTrash(newTrash.map(normalizeTask));
        setSel(null);
      } catch(err) {
        alert("Errore nel file: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Computed groups ──
  const groups = useMemo(() => {
    const active     = tasks.filter(t => t.progress < 100);
    const waiting    = active.filter(t => t.waiting && t.type !== "inbox");
    const actionable = active.filter(t => !t.waiting);
    const inbox   = actionable.filter(t => t.type === "inbox");
    const today_  = actionable.filter(t => t.type !== "inbox" && computeHz(t) === "today");
    const week    = actionable.filter(t => t.type !== "inbox" && computeHz(t) === "week");
    const month   = actionable.filter(t => t.type !== "inbox" && computeHz(t) === "month");
    const backlog = actionable.filter(t => t.type !== "inbox" && computeHz(t) === "backlog");
    const done    = tasks.filter(t => t.progress >= 100);
    const load    = today_.reduce((s, t) => s + (DURATION_MAP[t.duration] ? DURATION_MAP[t.duration].hours : 0), 0);
    const projects = actionable.filter(t => t.type === "project");
    return { inbox, today: today_, week, month, backlog, done, load, projects, waiting };
  }, [tasks]);

  const freeHours = Math.max(0, 8 - busyHours);

  const suggestions = useMemo(() => computeSuggestions({
    todayItems:   groups.today,
    inboxItems:   groups.inbox,
    projects:     groups.projects,
    backlogItems: groups.backlog,
    waitingItems: groups.waiting,
    load:         groups.load,
    freeHours:    freeHours,
  }), [groups, freeHours]);

  const selTask = tasks.find(t => t.id === sel);

  // ── Keyboard shortcut: Cmd/Ctrl+K to focus search ──
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        if (searchRef.current) { searchRef.current.focus(); searchRef.current.select(); }
      }
    }
    document.addEventListener("keydown", onKey);
    return function() { document.removeEventListener("keydown", onKey); };
  }, []);

  const searchResults = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return null;
    return tasks.filter(t => {
      if (t.progress >= 100) return false;
      if (t.title.toLowerCase().includes(q)) return true;
      if (t.description && t.description.toLowerCase().includes(q)) return true;
      if (t.subtasks.some(s => s.label.toLowerCase().includes(q))) return true;
      if (t.waitingFor && t.waitingFor.toLowerCase().includes(q)) return true;
      return false;
    });
  }, [query, tasks]);

  // ── Mutators ──
  const saveNew  = f => { setTasks(ts => [...ts, { waiting:false, waitingFor:"", waitingSince:"", ...f, id:Date.now() }]); setShowForm(false); };
  const saveEdit = f => {
    const prog = f.subtasks.length ? calcProg(f.subtasks) : f.progress;
    setTasks(ts => ts.map(t => t.id === f.id ? { ...f, progress:prog } : t));
    setEditTask(null);
  };

  const addSub  = (tid, label) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = [...t.subtasks, { id:Date.now(), label, done:false }];
    return { ...t, subtasks:subs, progress:calcProg(subs) };
  }));
  const delSub  = (tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = t.subtasks.filter(s => s.id !== sid);
    return { ...t, subtasks:subs, progress:calcProg(subs) };
  }));
  const toggleSub = (tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = t.subtasks.map(s => s.id === sid ? { ...s, done:!s.done } : s);
    return { ...t, subtasks:subs, progress:calcProg(subs) };
  }));
  const setNext = (tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const found   = t.subtasks.find(s => s.id === sid);
    const already = found ? found.next : false;
    return { ...t, subtasks:t.subtasks.map(s => ({ ...s, next:!already && s.id === sid })) };
  }));
  const updateProg     = (tid, v) => setTasks(ts => ts.map(t => t.id === tid && !t.subtasks.length ? { ...t, progress:v } : t));
  const completeTask   = tid => setTasks(ts => ts.map(t => t.id === tid ? { ...t, progress:100 } : t));
  const uncompleteTask = tid => { setTasks(ts => ts.map(t => t.id === tid ? { ...t, progress:0 } : t)); };

  const addAttachment    = (tid, meta) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, attachments:[...(t.attachments||[]), meta] } : t));
  const removeAttachment = (taskId, meta) => trashAttachment(taskId, (tasks.find(t => t.id === taskId) || {}).title || "", meta);
  const toggleWaiting = tid => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const nowWaiting = !t.waiting;
    return { ...t, waiting:nowWaiting, waitingSince:nowWaiting ? today : "", waitingFor:nowWaiting ? t.waitingFor : "" };
  }));
  const quickAdd = title => setTasks(ts => [...ts, { ...EMPTY_TASK, id:Date.now(), title, type:"inbox", urgency:null, importance:null }]);
  const newEmpty = () => ({ ...EMPTY_TASK, start:today, color: PALETTE[Math.floor(Math.random() * PALETTE.length)] });

  const handleReviewDecide = (tid, action, date) => {
    setTasks(ts => ts.map(t => {
      if (t.id !== tid) return t;
      if (action === "done")     return { ...t, progress:100 };
      if (action === "postpone") return { ...t, end:date };
      return t;
    }));
  };

  // Called when user classifies an inbox task from within EndOfDayReview
  const handleClassifyInbox = f => {
    const prog = f.subtasks.length ? calcProg(f.subtasks) : f.progress;
    const hz   = f.urgency && f.importance ? baseHz(f.urgency, f.importance) : "backlog";
    setTasks(ts => ts.map(t => t.id === f.id ? { ...f, progress:prog, horizon:hz } : t));
  };

  return (
    <ThemeCtx.Provider value={C}>
    <div style={{ fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", background:C.bg, minHeight:"100vh", color:C.l1, transition:"background 0.3s, color 0.3s" }}>
      <style>{`
        @keyframes panelIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${C.s3};border-radius:3px}
        input[type=date]::-webkit-calendar-picker-indicator{filter:${isDark ? "invert(0.5)" : "none"};cursor:pointer}
        input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:${C.s3};outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;margin-top:-6px}
        .agenda-row:hover{background:${C.s2}!important}
      `}</style>

      {/* Header */}
      <div style={{ background:C.header, backdropFilter:"blur(20px)", borderBottom:`1px solid ${C.sep}`, padding:"14px 24px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:14 }}>
            <h1 style={{ margin:0, fontSize:20, fontWeight:700, letterSpacing:-0.5, color:C.l1 }}>Attività</h1>
            <div style={{ display:"flex", gap:10 }}>
              {groups.today.length > 0 && <span style={{ fontSize:13, color:C.red }}>{groups.today.length} oggi</span>}
              {groups.inbox.length > 0 && <span style={{ fontSize:13, color:C.yellow }}>{groups.inbox.length} inbox</span>}
              {groups.load > 0 && <span style={{ fontSize:13, color:groups.load > freeHours ? C.red : C.l3 }}>~{groups.load < 1 ? "<1" : Math.round(groups.load)}h/{freeHours}h libere</span>}
            </div>
            <SavedIndicator savedAt={savedAt} />
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            {/* Import (hidden input) */}
            <input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={importJSON} />

            {/* Busy hours input */}
            <div title="Ore già occupate oggi (riunioni, impegni fissi)" style={{ display:"flex", alignItems:"center", gap:5, background:C.s2, borderRadius:10, padding:"0 10px", height:34, border:`1px solid ${busyHours > 0 ? `${C.orange}60` : "transparent"}`, transition:"border-color 0.2s" }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={busyHours > 0 ? C.orange : C.l3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0 }}>
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <input
                type="number" min="0" max="8" step="0.5"
                value={busyHours || ""}
                onChange={function(e) {
                  var v = parseFloat(e.target.value);
                  setBusyHours(isNaN(v) ? 0 : Math.min(8, Math.max(0, v)));
                }}
                placeholder="0"
                title="Ore già occupate oggi"
                style={{ width:32, background:"none", border:"none", outline:"none", fontSize:13, color:busyHours > 0 ? C.orange : C.l2, fontFamily:"inherit", textAlign:"center", padding:0 }}
              />
              <span style={{ fontSize:11, color:C.l3, whiteSpace:"nowrap" }}>h occupate</span>
            </div>

            {/* Trash button */}
            <button onClick={() => setShowTrash(true)} title="Cestino"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:(trash.length + attTrash.length) > 0 ? C.red : C.l3, flexShrink:0, position:"relative" }}>
              <svg width="14" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              {(trash.length + attTrash.length) > 0 && (
                <span style={{ position:"absolute", top:2, right:2, width:8, height:8, borderRadius:"50%", background:C.red, border:`1.5px solid ${C.bg}` }} />
              )}
            </button>

            {/* Import button */}
            <button onClick={() => importRef.current.click()} title="Importa backup JSON"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.l3, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </button>

            {/* Export button */}
            <button onClick={exportJSON} title="Esporta backup JSON"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.l3, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>

            {/* Search */}
            <div style={{ position:"relative", display:"flex", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", background:C.s2, borderRadius:10, border:`1px solid ${query ? `${C.blue}60` : "transparent"}`, transition:"all 0.2s", overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", paddingLeft:10, color:C.l3, flexShrink:0 }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                </div>
                <input
                  ref={searchRef}
                  value={query}
                  onChange={e => { setQuery(e.target.value); setSel(null); }}
                  onKeyDown={e => { if (e.key === "Escape") { setQuery(""); searchRef.current.blur(); } }}
                  placeholder="Cerca…"
                  style={{ background:"none", border:"none", outline:"none", fontSize:13, color:C.l1, padding:"7px 10px 7px 7px", width: query ? 180 : 90, transition:"width 0.25s", fontFamily:"inherit" }}
                />
                {query && (
                  <button onClick={() => { setQuery(""); searchRef.current.focus(); }}
                    style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", padding:"0 8px 0 0", fontSize:14, lineHeight:1, display:"flex", alignItems:"center" }}>✕</button>
                )}
              </div>
            </div>

            {/* View tabs */}
            <div style={{ display:"flex", background:C.s2, borderRadius:10, padding:3, gap:2 }}>
              {[["agenda","Agenda"],["gantt","Gantt"]].map(function(pair) {
                var v = pair[0]; var label = pair[1];
                return (
                  <button key={v} onClick={() => setViewMode(v)}
                    style={{ background: viewMode === v ? C.s1 : "transparent", border:"none", borderRadius:7, padding:"5px 14px", cursor:"pointer", fontSize:12, fontWeight:600, color: viewMode === v ? C.l1 : C.l3, fontFamily:"inherit", transition:"all 0.15s", boxShadow: viewMode === v ? "0 1px 4px rgba(0,0,0,0.15)" : "none" }}>
                    {label}
                  </button>
                );
              })}
            </div>

            {/* Theme toggle */}
            <button onClick={() => setIsDark(d => !d)} title={isDark ? "Passa a light mode" : "Passa a dark mode"}
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color:C.l2, flexShrink:0 }}>
              {isDark ? (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
              ) : (
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              )}
            </button>

            {/* Review */}
            <button onClick={() => setShowReview(true)} title="Chiusura giornata"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color:C.l2, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </button>

            <button onClick={() => setShowForm(true)} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, padding:"8px 18px", fontWeight:600, fontSize:14, cursor:"pointer", letterSpacing:-0.2 }}>+ Nuovo</button>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", height:"calc(100vh - 57px)" }}>
        {searchResults ? (
          /* ── Search results ── */
          <div onClick={() => setSel(null)} style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>
            <div onClick={e => e.stopPropagation()}>
              <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:16 }}>
                <span style={{ fontSize:13, fontWeight:700, color:C.l1 }}>
                  {searchResults.length === 0 ? "Nessun risultato" : `${searchResults.length} risultat${searchResults.length === 1 ? "o" : "i"}`}
                </span>
                <span style={{ fontSize:12, color:C.l3 }}>per "{query}"</span>
              </div>
              {searchResults.length > 0 && (
                <div style={card(C)}>
                  {searchResults.map((task, idx) => {
                    const q = query.trim().toLowerCase();
                    const matchSubs = task.subtasks.filter(s => s.label.toLowerCase().includes(q));
                    const hz = computeHz(task);
                    const hzC = hzColor(hz, C);
                    return (
                      <div key={task.id} style={{ borderBottom: idx < searchResults.length-1 ? `1px solid ${C.sep}` : "none" }}>
                        <div style={{ display:"flex", alignItems:"stretch", cursor:"pointer", transition:"background 0.1s" }}
                          onClick={() => setSel(sel === task.id ? null : task.id)}
                          onMouseEnter={e => e.currentTarget.style.background = C.s2}
                          onMouseLeave={e => e.currentTarget.style.background = ""}>
                          {/* Hz color bar */}
                          <div style={{ width:4, background: task.type === "inbox" ? C.l3 : hzC, flexShrink:0, borderRadius:"4px 0 0 4px" }} />
                          <div style={{ flex:1, padding:"11px 14px" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom: matchSubs.length ? 5 : 0 }}>
                              <div style={{ width:7, height:7, borderRadius:"50%", background:task.color, flexShrink:0 }} />
                              <span style={{ fontSize:13, fontWeight:600, color:C.l1 }}>{task.title}</span>
                              <span style={{ fontSize:11, color:C.l3, marginLeft:"auto" }}>
                                {task.type === "inbox" ? "Inbox" : task.type === "project" ? "Progetto" : "Azione"}
                              </span>
                              {task.end && <span style={{ fontSize:11, color:C.l3 }}>→ {fmtDate(task.end)}</span>}
                            </div>
                            {task.description && task.description.toLowerCase().includes(q) && (
                              <div style={{ fontSize:11, color:C.l3, marginTop:3, paddingLeft:15, fontStyle:"italic" }}>
                                {task.description.slice(0, 100)}{task.description.length > 100 ? "…" : ""}
                              </div>
                            )}
                            {matchSubs.length > 0 && (
                              <div style={{ display:"flex", flexWrap:"wrap", gap:4, paddingLeft:15, marginTop:4 }}>
                                {matchSubs.map(s => (
                                  <span key={s.id} style={{ fontSize:10, color:C.l3, background:C.s3, borderRadius:5, padding:"2px 7px" }}>
                                    {s.done ? "✓ " : ""}{s.label}
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        ) : viewMode === "gantt" ? (
          <GanttView tasks={tasks} onSelect={id => setSel(sel === id ? null : id)} />
        ) : (
        <div onClick={() => setSel(null)} style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>
          <div onClick={e => e.stopPropagation()}>
            <QuickCapture onAdd={quickAdd} />
            <SuggestionWhisper suggestions={suggestions} />
          </div>

          {groups.inbox.length > 0 && (
            <AgendaSection items={groups.inbox} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Inbox" color={C.yellow} />
          )}
          <AgendaSection items={groups.today} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask}
            label="Oggi" color={C.red}
            extra={groups.load > freeHours ? { text:`~${Math.round(groups.load)}h · overcommitment`, color:C.red } : groups.load > 0 ? { text:`~${groups.load < 1 ? "<1" : Math.round(groups.load)}h stimato`, color:C.l3 } : null} />
          <AgendaSection items={groups.week} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Questa settimana" color={C.orange} />
          <AgendaSection items={groups.month} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Prossime settimane" color={C.blue} />
          <AgendaSection items={groups.backlog} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Backlog" color={C.l3} />
          {groups.waiting.length > 0 && (
            <AgendaSection items={groups.waiting} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="In attesa" color={C.teal} />
          )}

          {groups.done.length > 0 && (
            <DoneSection done={groups.done} sel={sel} setSel={setSel} setTasks={setTasks} trashAll={trashAll} sep={C.sep} />
          )}

          {!groups.inbox.length && !groups.today.length && !groups.week.length && !groups.month.length && !groups.backlog.length && !groups.waiting.length && (
            <div style={{ textAlign:"center", padding:"60px 24px 80px", color:C.l3, userSelect:"none" }}>
              <div style={{ fontSize:36, marginBottom:16, opacity:0.4 }}>✦</div>
              <div style={{ fontSize:16, fontWeight:600, color:C.l2, marginBottom:8 }}>Nessun task ancora</div>
              <div style={{ fontSize:13, color:C.l3, lineHeight:1.6, maxWidth:280, margin:"0 auto 32px" }}>
                Cattura un pensiero nella barra qui sopra, oppure crea un task strutturato con <span style={{ color:C.blue, fontWeight:500 }}>+ Nuovo</span> in alto a destra.
              </div>
              {/* Arrow pointing up toward QuickCapture */}
              <svg width="24" height="48" viewBox="0 0 24 48" fill="none" style={{ margin:"0 auto", display:"block", opacity:0.3 }}>
                <line x1="12" y1="48" x2="12" y2="4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="4 4"/>
                <path d="M5 12L12 4L19 12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          )}
        </div>
        )} {/* end main view */}

        {selTask && (
          <DetailPanel task={selTask} onClose={() => setSel(null)}
            onEdit={() => setEditTask({ ...selTask })} onDelete={moveToTrash} onComplete={completeTask} onUncomplete={uncompleteTask}
            onToggleSub={toggleSub} onAddSub={addSub} onDelSub={delSub} onSetNext={setNext}
            onUpdateProg={updateProg} onToggleWaiting={toggleWaiting}
            onAddAttachment={addAttachment} onRemoveAttachment={removeAttachment} />
        )}
      </div>

      {showForm   && <TaskForm initial={newEmpty()}  onSave={saveNew}  onClose={() => setShowForm(false)} />}
      {editTask   && <TaskForm initial={editTask}  onSave={saveEdit} onClose={() => setEditTask(null)} isEdit />}
      {showReview && <EndOfDayReview tasks={tasks} onClose={() => setShowReview(false)} onDecide={handleReviewDecide} onClassifyInbox={handleClassifyInbox} />}
      {showTrash  && <TrashModal trash={trash} attTrash={attTrash} onClose={() => setShowTrash(false)} onRestore={restoreFromTrash} onDeleteOne={deleteFromTrash} onRestoreAtt={restoreAttachment} onDeleteAtt={deleteAttachment} onEmpty={emptyTrash} />}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

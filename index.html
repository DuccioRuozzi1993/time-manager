// ── Event log helpers ──
function readEventLog() {
  try { const r = localStorage.getItem(LS_EVENT_LOG); return r ? JSON.parse(r) : []; } catch { return []; }
}
function writeEventLog(events) {
  try { localStorage.setItem(LS_EVENT_LOG, JSON.stringify(events.slice(-MAX_EVENTS))); } catch {}
}
function appendEvent(type, taskId, meta) {
  const events = readEventLog();
  events.push({ type, taskId, date: today, ...(meta || {}) });
  writeEventLog(events);
}

// ── IndexedDB — attachment storage ──
const IDB_NAME  = "tm_files_v1";
const IDB_STORE = "attachments";

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE, { keyPath:"id" });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}

function idbSave(record) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(record);
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function(e) { reject(e.target.error); };
    });
  });
}

function idbGet(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction(IDB_STORE, "readonly");
      var req = tx.objectStore(IDB_STORE).get(id);
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  });
}

function idbDelete(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function(e) { reject(e.target.error); };
    });
  });
}

const MATRIX = [

  { u:2,i:2, label:"Fai subito", sub:"Urgente e importante",       color:DARK.red,    hz:"today",   q:"Q1" },
  { u:1,i:1, label:"Parcheggia", sub:"Non urgente, non importante", color:DARK.muted,  hz:"backlog", q:"Q4" },
  { u:2,i:1, label:"Sbriga",     sub:"Urgente ma non importante",  color:DARK.purple, hz:"week",    q:"Q3" },
];

const getCell = (u,i) => MATRIX.find(c=>c.u===u&&c.i===i);
const baseHz  = (u,i) => { const c = getCell(u,i); return c ? c.hz : "backlog"; };
const RANK    = {backlog:0,month:1,week:2,today:3};
const maxHz   = (a,b) => RANK[a]>RANK[b]?a:b;

const today   = new Date().toISOString().split("T")[0];
const T       = n => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };

function workDiff(a, b) {
  const start = new Date(a < b ? a : b);
  const end   = new Date(a < b ? b : a);
  let count = 0;
  const cur = new Date(start);
  while (cur < end) {
    const d = cur.getDay();
    if (d !== 0 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return a <= b ? count : -count;
}

const _fmt    = new Intl.DateTimeFormat("it-IT", { day:"2-digit", month:"short" });
const fmtDate = d => _fmt.format(new Date(d));

function computeHz(item) {
  if (item.progress >= 100) return "done";
  if (item.type === "inbox") return "inbox";
  const base = baseHz(item.urgency, item.importance);
  const dL   = item.end ? workDiff(today, item.end) : 999;
  let dHz = base;
  if (dL <= 0)        dHz = "today";
  else if (dL <= 3)   dHz = maxHz(base, "today");
  else if (dL <= 14)  dHz = maxHz(base, "week");
  const risk = dL > 0 ? (100 - item.progress) / dL : 99;
  let rHz = dHz;
  if (risk > 20) rHz = maxHz(dHz, "today");
  else if (risk > 8) rHz = maxHz(dHz, "week");
  return maxHz(dHz, rHz);
}

function getRisk(item) {
  if (item.progress >= 100 || !item.end) return null;
  const dL = workDiff(today, item.end);
  if (dL <= 0) return null;
  const idx = (100 - item.progress) / dL;
  const C = DARK; // colors resolved at call site when needed
  if (idx > 20) return { level:"critical", colorKey:"red",    label:"Rischio alto", tip:`${Math.round(idx)} pt/g` };
  if (idx > 8)  return { level:"warning",  colorKey:"orange", label:"Attenzione",   tip:`${Math.round(idx)} pt/g` };
  return null;
}

function isEscalated(item) {
  if (!item.urgency || !item.importance || !item.end) return false;
  return RANK[computeHz(item)] > RANK[baseHz(item.urgency, item.importance)];
}

// ── Behavioral suggestions — derived from event log ──
function computeBehavioralSuggestions(tasks, events) {
  const out = [];
  if (!events.length) return out;

  // Count postponements per task
  const postponeCount = {};
  events.forEach(e => {
    if (e.type === "postponed") {
      postponeCount[e.taskId] = (postponeCount[e.taskId] || 0) + 1;
    }
  });

  // Tasks postponed 3+ times that are still active
  const activeTasks = tasks.filter(t => t.progress < 100);
  const repeatOffenders = activeTasks.filter(t => (postponeCount[t.id] || 0) >= 3);
  if (repeatOffenders.length > 0) {
    const t = repeatOffenders[0];
    const count = postponeCount[t.id];
    out.push({
      id: "repeat_postpone_" + t.id,
      icon: "warning",
      text: "\"" + t.title + "\" è stato posticipato " + count + " volte. È ancora rilevante, o puoi eliminarlo?",
      action: { label: "Elimina", type: "trash", taskId: t.id },
      action2: { label: "Tienilo", type: "dismiss_postpone", taskId: t.id },
    });
  }

  // Tasks created more than 14 days ago still in backlog
  const createDates = {};
  events.forEach(e => {
    if (e.type === "created") createDates[e.taskId] = e.date;
  });

  const staleBacklog = activeTasks.filter(t => {
    if (t.type === "inbox" || t.waiting) return false;
    const hz = computeHz(t);
    if (hz !== "backlog") return false;
    const created = createDates[t.id];
    if (!created) return false;
    return workDiff(created, today) > 14;
  });

  if (staleBacklog.length > 0) {
    const t = staleBacklog[0];
    const days = createDates[t.id] ? workDiff(createDates[t.id], today) : "?";
    out.push({
      id: "stale_backlog_" + t.id,
      icon: "archive",
      text: "\"" + t.title + "\" è fermo in backlog da " + days + " giorni lavorativi. Vuoi ancora farlo?",
      action: { label: "Elimina", type: "trash", taskId: t.id },
      action2: { label: "Tienilo", type: "dismiss_stale", taskId: t.id },
    });
  }

  return out;
}

function computeSuggestions({ todayItems, inboxItems, projects, backlogItems, waitingItems, load, freeHours }) {
  const out = [];
  const isThursday = new Date().getDay() === 4;
  if (load > freeHours)
    out.push({ id:"overload", icon:"warning", text:`Oggi hai ~${Math.round(load)}h di lavoro stimato su ${freeHours}h disponibili. Considera di spostare qualcosa.` });
  if (todayItems.length > 5)
    out.push({ id:"today_overflow", icon:"warning", text:`${todayItems.length} priorità oggi. La working memory gestisce al meglio 3–4 unità. Valuta cosa posticipare.` });
  if (inboxItems.length > 3)
    out.push({ id:"inbox", icon:"inbox", text:`${inboxItems.length} task non classificati in inbox. 5 minuti di elaborazione riducono il carico cognitivo residuo.` });
  const orphans = projects.filter(p => p.subtasks.length > 0 && !p.subtasks.find(s => s.next && !s.done));
  if (orphans.length > 0)
    out.push({ id:"orphan", icon:"layers", text:`${orphans.length} progett${orphans.length > 1 ? "i" : "o"} senza azione "Prossimo". Senza next action un progetto rimane bloccato nella mente.` });
  if (backlogItems.length > 5)
    out.push({ id:"backlog", icon:"archive", text:`${backlogItems.length} task in backlog. Ogni loop aperto consuma risorse cognitive. Parcheggia quello che non farai mai.` });
  if (isThursday && waitingItems.length > 0)
    out.push({ id:"waiting_review", icon:"pause", text:`È giovedì — hai ${waitingItems.length} task in attesa. Controlla se qualcuno si è mosso e aggiorna lo stato.` });
  else if (!isThursday && waitingItems.length > 0) {
    const stale = waitingItems.filter(t => t.waitingSince && workDiff(t.waitingSince, today) > 7);
    if (stale.length > 0)
      out.push({ id:"waiting_stale", icon:"pause", text:`${stale.length} task in attesa da oltre 7 giorni lavorativi. Giovedì è il momento per fare il punto.` });
  }
  return out;
}

function smartSort(items) {
  return [...items].sort((a, b) => {
    // 1. Pinned
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    // 2. Scaduto o scade oggi
    const dA = a.end ? workDiff(today, a.end) : 999;
    const dB = b.end ? workDiff(today, b.end) : 999;
    const urgA = dA <= 0 ? 0 : dA <= 3 ? 1 : 2;
    const urgB = dB <= 0 ? 0 : dB <= 3 ? 1 : 2;
    if (urgA !== urgB) return urgA - urgB;
    // 3. Rischio escalation
    const rA = getRisk(a);
    const rB = getRisk(b);
    const rLvl = r => !r ? 2 : r.level === "critical" ? 0 : 1;
    if (rLvl(rA) !== rLvl(rB)) return rLvl(rA) - rLvl(rB);
    // 4. Ha una next action definita
    const nA = a.subtasks.some(s => s.next && !s.done) ? 0 : 1;
    const nB = b.subtasks.some(s => s.next && !s.done) ? 0 : 1;
    if (nA !== nB) return nA - nB;
    // 5. Ha scadenza vs non ha
    if (dA !== dB) return dA - dB;
    return 0;
  });
}

const calcProg  = subs => subs.length ? Math.round(subs.filter(s => s.done).length / subs.length * 100) : 0;
const EMPTY_TASK = { title:"", type:"action", color:PALETTE[4], urgency:null, importance:null, start:"", end:"", progress:0, duration:"quick", description:"", subtasks:[], attachments:[], waiting:false, waitingFor:"", waitingSince:"", pinned:false, recurrence:null, snoozedUntil:null };

// ── Recurrence helper — computes next due date from a completed task ──
function nextRecurrenceDate(endStr, rec) {
  if (!endStr || !rec) return null;
  const d = new Date(endStr + "T12:00:00");
  if (rec.freq === "daily") {
    d.setDate(d.getDate() + 1);
  } else if (rec.freq === "weekly") {
    d.setDate(d.getDate() + 7);
  } else if (rec.freq === "monthly") {
    d.setMonth(d.getMonth() + 1);
  }
  return d.toISOString().split("T")[0];
}

// ── Schema normalizer — merges saved data with current EMPTY_TASK defaults ──
// Ensures tasks saved by older versions of the app get new fields filled in
function normalizeTask(raw) {
  return { ...EMPTY_TASK, ...raw,
    subtasks:    (raw.subtasks    || []).map(s => ({ done:false, next:false, ...s })),
    attachments: (raw.attachments || []),
  };
}

// ── Templates Modal ──
function TemplatesModal({ templates, onClose, onSave }) {
  const C = useContext(ThemeCtx);
  const [list, setList] = useState(() => templates.map(t => ({ ...t, subtasks: t.subtasks.map(s => ({ ...s })) })));
  const [editingId, setEditingId]     = useState(null); // template id being edited
  const [editingName, setEditingName] = useState("");
  const [newSubIn, setNewSubIn]       = useState({});   // { [templateId]: string }
  const [editingSub, setEditingSub]   = useState(null); // { tid, sid, value }
  const [newTplName, setNewTplName]   = useState("");
  const [confirm, setConfirm]         = useState(null); // id to delete

  function addTemplate() {
    const name = newTplName.trim();
    if (!name) return;
    setList(l => [...l, { id: Date.now(), name, subtasks: [] }]);
    setNewTplName("");
  }

  function deleteTemplate(id) { setList(l => l.filter(t => t.id !== id)); setConfirm(null); }

  function startRename(t) { setEditingId(t.id); setEditingName(t.name); }
  function commitRename(id) {
    const n = editingName.trim();
    if (n) setList(l => l.map(t => t.id === id ? { ...t, name: n } : t));
    setEditingId(null);
  }

  function addSub(tid) {
    const label = (newSubIn[tid] || "").trim();
    if (!label) return;
    setList(l => l.map(t => t.id === tid ? { ...t, subtasks: [...t.subtasks, { id: Date.now(), label }] } : t));
    setNewSubIn(s => ({ ...s, [tid]: "" }));
  }
  function delSub(tid, sid) {
    setList(l => l.map(t => t.id === tid ? { ...t, subtasks: t.subtasks.filter(s => s.id !== sid) } : t));
  }
  function commitSubRename(tid, sid) {
    const v = (editingSub && editingSub.value || "").trim();
    if (v) setList(l => l.map(t => t.id === tid ? { ...t, subtasks: t.subtasks.map(s => s.id === sid ? { ...s, label: v } : s) } : t));
    setEditingSub(null);
  }

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.s1, borderRadius:22, padding:"24px", width:520, maxWidth:"95vw", maxHeight:"88vh", display:"flex", flexDirection:"column", boxShadow:"0 28px 70px rgba(0,0,0,0.5)" }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, flexShrink:0 }}>
          <div>
            <div style={{ fontSize:17, fontWeight:700, color:C.l1 }}>Modelli di sottotask</div>
            <div style={{ fontSize:12, color:C.l3, marginTop:2 }}>Schemi riutilizzabili da applicare ai task</div>
          </div>
          <button onClick={() => { onSave(list); onClose(); }} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, padding:"8px 18px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Salva</button>
        </div>

        {/* New template input */}
        <div style={{ display:"flex", gap:8, marginBottom:18, flexShrink:0 }}>
          <input style={inp(C, { flex:1 })} value={newTplName} placeholder="Nome nuovo modello…"
            onChange={e => setNewTplName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addTemplate()} />
          <button onClick={addTemplate}
            style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, width:42, cursor:"pointer", fontSize:20, fontWeight:300, flexShrink:0 }}>+</button>
        </div>

        {/* List */}
        <div style={{ overflowY:"auto", flex:1, display:"flex", flexDirection:"column", gap:12 }}>
          {list.length === 0 && (
            <div style={{ textAlign:"center", padding:"40px 0", color:C.l3, fontSize:13 }}>Nessun modello ancora. Creane uno qui sopra.</div>
          )}
          {list.map(tpl => (
            <div key={tpl.id} style={{ background:C.s2, borderRadius:14, padding:"14px 16px" }}>

              {/* Template name row */}
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                {editingId === tpl.id ? (
                  <input autoFocus value={editingName} onChange={e => setEditingName(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") commitRename(tpl.id); if (e.key === "Escape") setEditingId(null); }}
                    onBlur={() => commitRename(tpl.id)}
                    style={{ flex:1, background:"none", border:"none", borderBottom:`1.5px solid ${C.blue}`, outline:"none", fontSize:14, fontWeight:700, color:C.l1, padding:"1px 2px", fontFamily:"inherit" }} />
                ) : (
                  <span onClick={() => startRename(tpl)} title="Clicca per rinominare"
                    style={{ flex:1, fontSize:14, fontWeight:700, color:C.l1, cursor:"text" }}>{tpl.name}</span>
                )}
                <button onClick={() => setConfirm(tpl.id)}
                  style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:12, opacity:0.5, fontFamily:"inherit", padding:"2px 6px" }}
                  onMouseEnter={e => e.currentTarget.style.opacity="1"}
                  onMouseLeave={e => e.currentTarget.style.opacity="0.5"}>Elimina</button>
              </div>

              {/* Subtasks */}
              {tpl.subtasks.length > 0 && (
                <div style={{ background:C.s1, borderRadius:10, overflow:"hidden", marginBottom:8 }}>
                  {tpl.subtasks.map((s, idx) => (
                    <div key={s.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", borderBottom: idx < tpl.subtasks.length-1 ? `1px solid ${C.sep}` : "none" }}>
                      <div style={{ width:5, height:5, borderRadius:"50%", background:C.l3, flexShrink:0 }} />
                      {editingSub && editingSub.tid === tpl.id && editingSub.sid === s.id ? (
                        <input autoFocus value={editingSub.value}
                          onChange={e => setEditingSub(es => ({ ...es, value: e.target.value }))}
                          onKeyDown={e => { if (e.key === "Enter") commitSubRename(tpl.id, s.id); if (e.key === "Escape") setEditingSub(null); }}
                          onBlur={() => commitSubRename(tpl.id, s.id)}
                          style={{ flex:1, background:"none", border:"none", borderBottom:`1.5px solid ${C.blue}`, outline:"none", fontSize:13, color:C.l1, padding:"1px 2px", fontFamily:"inherit" }} />
                      ) : (
                        <span onClick={() => setEditingSub({ tid:tpl.id, sid:s.id, value:s.label })}
                          title="Clicca per modificare"
                          style={{ flex:1, fontSize:13, color:C.l1, cursor:"text" }}>{s.label}</span>
                      )}
                      <button onClick={() => delSub(tpl.id, s.id)}
                        style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:16, opacity:0.4, padding:0, lineHeight:1 }}
                        onMouseEnter={e => e.currentTarget.style.opacity="1"}
                        onMouseLeave={e => e.currentTarget.style.opacity="0.4"}>−</button>
                    </div>
                  ))}
                </div>
              )}

              {/* Add subtask to template */}
              <div style={{ display:"flex", gap:6 }}>
                <input style={inp(C, { flex:1, fontSize:12, padding:"7px 10px" })}
                  value={newSubIn[tpl.id] || ""}
                  placeholder="Aggiungi voce al modello…"
                  onChange={e => setNewSubIn(s => ({ ...s, [tpl.id]: e.target.value }))}
                  onKeyDown={e => e.key === "Enter" && addSub(tpl.id)} />
                <button onClick={() => addSub(tpl.id)}
                  style={{ background:C.s3, border:"none", color:C.blue, borderRadius:8, width:32, cursor:"pointer", fontSize:18, flexShrink:0 }}>+</button>
              </div>

            </div>
          ))}
        </div>

        {/* Confirm delete */}
        {confirm && (
          <div style={{ marginTop:14, background:`${C.red}12`, borderRadius:12, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexShrink:0 }}>
            <span style={{ fontSize:13, color:C.l2 }}>Eliminare questo modello?</span>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => setConfirm(null)} style={{ fontSize:12, color:C.l3, background:C.s3, border:"none", borderRadius:8, padding:"5px 12px", cursor:"pointer", fontFamily:"inherit" }}>Annulla</button>
              <button onClick={() => deleteTemplate(confirm)} style={{ fontSize:12, color:"#fff", background:C.red, border:"none", borderRadius:8, padding:"5px 12px", cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>Elimina</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function TaskForm({ initial, onSave, onClose, isEdit=false, templates=[], onSaveTemplate }) {
  const C   = useContext(ThemeCtx);
  const lbl = slbl(C);
  const [form, setForm] = useState(initial);
  const [subIn, setSubIn] = useState("");
  const [editingSub, setEditingSub] = useState(null);
  const [showTplPicker, setShowTplPicker] = useState(false);
  const [saveTplName, setSaveTplName]     = useState("");
  const [showSaveTpl, setShowSaveTpl]     = useState(false);
  const set = (k,v) => setForm(f => ({ ...f, [k]:v }));
  const ok  = form.title.trim() && (form.type === "inbox" || form.urgency !== null);

  const handleSave = () => {
    if (!ok) return;
    const hz = form.urgency && form.importance ? baseHz(form.urgency, form.importance) : "backlog";
    onSave({ ...form, horizon:hz });
  };

  function addSubField() {
    const l = subIn.trim();
    if (!l) return;
    set("subtasks", [...form.subtasks, { id:Date.now(), label:l, done:false }]);
    setSubIn("");
  }

  const cell = form.urgency && form.importance ? getCell(form.urgency, form.importance) : null;

  return (
    <Sheet onClose={onClose} width={500}>

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
        <div style={{ fontSize:17, fontWeight:700, color:C.l1 }}>{isEdit ? "Modifica task" : "Nuovo task"}</div>
        <button onClick={onClose} style={{ background:C.s3, border:"none", color:C.l2, borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
      </div>

      {/* Title */}
      <div style={{ marginBottom:16 }}>
        <span style={lbl}>Titolo</span>
        <input style={inp(C)} value={form.title} placeholder="Es. Preparare presentazione…" autoFocus onChange={e => set("title", e.target.value)} onKeyDown={e => e.key === "Enter" && handleSave()} />
      </div>

      {/* Matrix — urgency × importance */}
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={lbl}>Priorità <span style={{ fontWeight:400, color:C.l3 }}>(urgenza × importanza)</span></span>
          {form.type === "inbox" && (
            <span style={{ fontSize:11, color:C.teal, fontWeight:500 }}>classificato come inbox</span>
          )}
        </div>
        <div style={{ display:"flex", paddingLeft:44, marginBottom:4 }}>
          {["Non urgente","Urgente"].map(l => (
            <div key={l} style={{ flex:1, textAlign:"center", fontSize:9, color:C.l3, fontWeight:600, letterSpacing:0.7 }}>{l.toUpperCase()}</div>
          ))}
        </div>
        <div style={{ display:"flex", gap:5 }}>
          <div style={{ display:"flex", flexDirection:"column", width:40, gap:4 }}>
            {["Alta","Bassa"].map(l => (
              <div key={l} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:6, minHeight:64 }}>
                <span style={{ fontSize:9, color:C.l3, fontWeight:600, letterSpacing:0.7 }}>{l.toUpperCase()}</span>
              </div>
            ))}
          </div>
          <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 1fr", gap:5 }}>
            {MATRIX.map(c => {
              var isSel = form.urgency === c.u && form.importance === c.i;
              return (
                <div key={c.u+""+c.i}
                  onClick={() => setForm(f => ({ ...f, urgency:c.u, importance:c.i, type: f.type === "inbox" ? "action" : f.type }))}
                  style={{ background:isSel ? c.color+"28" : C.s2, borderRadius:10, padding:"10px 12px", cursor:"pointer", border:"1.5px solid "+(isSel ? c.color : "transparent"), transition:"all 0.15s", minHeight:64, display:"flex", flexDirection:"column", justifyContent:"center", gap:2 }}
                  onMouseEnter={function(e){ if (!isSel) e.currentTarget.style.background = C.s3; }}
                  onMouseLeave={function(e){ if (!isSel) e.currentTarget.style.background = C.s2; }}>
                  <div style={{ fontSize:12, fontWeight:700, color:isSel ? c.color : C.l1 }}>{c.label}</div>
                  <div style={{ fontSize:10, color:C.l3, lineHeight:1.35 }}>{c.sub}</div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Selected cell hint + inbox escape hatch */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:7 }}>
          <div>
            {cell && (
              <span style={{ fontSize:11, color:cell.color, fontWeight:500 }}>
                → agenda: {HZ[cell.hz] ? HZ[cell.hz].label : ""}
              </span>
            )}
            {!cell && form.type !== "inbox" && (
              <span style={{ fontSize:11, color:C.l3 }}>Seleziona un quadrante per classificare</span>
            )}
          </div>
          <button
            onClick={() => setForm(f => ({ ...f, type:"inbox", urgency:null, importance:null }))}
            style={{ background:"none", border:"none", fontSize:11, color:form.type === "inbox" ? C.teal : C.l3, cursor:"pointer", padding:0, fontFamily:"inherit", fontWeight: form.type === "inbox" ? 600 : 400 }}>
            {form.type === "inbox" ? "✓ Classifica dopo" : "Classifica dopo →"}
          </button>
        </div>
      </div>

      {form.type !== "inbox" && (
        <>
          {/* Duration */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Impegno stimato</span>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {DURATIONS.filter(function(d){ return ACTION_DURATIONS.indexOf(d.id) >= 0; }).map(d => (
                <div key={d.id} onClick={() => set("duration", d.id)} style={{ flex:1, padding:"9px 10px", borderRadius:10, background:form.duration === d.id ? `${C.blue}20` : C.s2, border:"1.5px solid "+(form.duration === d.id ? C.blue : "transparent"), cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
                  <div style={{ display:"flex", justifyContent:"center", marginBottom:4, color:form.duration === d.id ? C.blue : C.l3 }}><Icon name={d.icon} size={14} color="currentColor" /></div>
                  <div style={{ fontSize:11, fontWeight:600, color:form.duration === d.id ? C.blue : C.l1 }}>{d.label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Dates */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
            <div><span style={lbl}>Inizio <span style={{ color:C.l3, fontWeight:400 }}>(opz.)</span></span><input type="date" style={inp(C)} value={form.start} onChange={e => set("start", e.target.value)} /></div>
            <div><span style={lbl}>Scadenza <span style={{ color:C.l3, fontWeight:400 }}>(opz.)</span></span><input type="date" style={inp(C)} value={form.end} onChange={e => set("end", e.target.value)} /></div>
          </div>

          {/* Recurrence */}
          <div style={{ marginBottom:14 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: form.recurrence ? 8 : 0 }}>
              <span style={{ ...lbl, marginBottom:0 }}>Ricorrenza</span>
              <button onClick={() => set("recurrence", form.recurrence ? null : { freq:"weekly" })}
                style={{ fontSize:11, color: form.recurrence ? C.blue : C.l3, background: form.recurrence ? `${C.blue}18` : "none", border:`1px solid ${form.recurrence ? `${C.blue}60` : C.sep}`, borderRadius:7, padding:"3px 10px", cursor:"pointer", fontFamily:"inherit", fontWeight:500, transition:"all 0.15s" }}>
                {form.recurrence ? "✓ Attiva" : "Attiva"}
              </button>
            </div>
            {form.recurrence && (
              <div style={{ display:"flex", gap:6 }}>
                {[
                  { id:"daily",   label:"Ogni giorno" },
                  { id:"weekly",  label:"Ogni settimana" },
                  { id:"monthly", label:"Ogni mese" },
                ].map(opt => (
                  <button key={opt.id}
                    onClick={() => set("recurrence", { freq:opt.id })}
                    style={{ flex:1, padding:"8px 6px", borderRadius:10, background: form.recurrence.freq === opt.id ? `${C.blue}20` : C.s2, border:`1.5px solid ${form.recurrence.freq === opt.id ? C.blue : "transparent"}`, cursor:"pointer", fontSize:12, fontWeight:600, color: form.recurrence.freq === opt.id ? C.blue : C.l1, fontFamily:"inherit", transition:"all 0.15s" }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            )}
            {form.recurrence && !form.end && (
              <div style={{ fontSize:11, color:C.orange, marginTop:6 }}>⚠ Imposta una scadenza per attivare la ricorrenza.</div>
            )}
          </div>

          {/* Color */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Colore identità</span>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              {PALETTE.slice(0, 7).map(c => (
                <div key={c} onClick={() => set("color", c)} style={{ width:22, height:22, borderRadius:"50%", background:c, cursor:"pointer", flexShrink:0, boxShadow:form.color === c ? `0 0 0 3px ${C.bg},0 0 0 5px ${c}` : "none", transition:"box-shadow 0.2s" }} />
              ))}
              <label title="Colore personalizzato" style={{ width:22, height:22, borderRadius:"50%", background:PALETTE.indexOf(form.color) === -1 ? form.color : C.s3, cursor:"pointer", flexShrink:0, boxShadow:PALETTE.indexOf(form.color) === -1 ? `0 0 0 3px ${C.bg},0 0 0 5px ${form.color}` : "none", transition:"box-shadow 0.2s", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", border:"1.5px dashed "+C.l3 }}>
                <input type="color" value={form.color} onChange={e => set("color", e.target.value)} style={{ opacity:0, position:"absolute", width:1, height:1, pointerEvents:"none" }} />
                {PALETTE.indexOf(form.color) !== -1 && <span style={{ fontSize:13, color:C.l3, lineHeight:1 }}>+</span>}
              </label>
            </div>
          </div>

          {/* Subtasks */}
          <div style={{ marginBottom:14 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
              <span style={lbl}>Sotto-attività {form.subtasks.length > 0 && <span style={{ color:C.l3, fontWeight:400 }}>({form.subtasks.length})</span>}</span>
              <div style={{ display:"flex", gap:6 }}>
                {templates.length > 0 && (
                  <button onClick={() => setShowTplPicker(p => !p)}
                    style={{ fontSize:11, color: showTplPicker ? C.blue : C.l3, background: showTplPicker ? `${C.blue}18` : "none", border:`1px solid ${showTplPicker ? `${C.blue}60` : C.sep}`, borderRadius:7, padding:"3px 10px", cursor:"pointer", fontFamily:"inherit", fontWeight:500, transition:"all 0.15s" }}>
                    Da modello ↓
                  </button>
                )}
                {form.subtasks.length > 0 && onSaveTemplate && (
                  <button onClick={() => setShowSaveTpl(p => !p)}
                    style={{ fontSize:11, color: showSaveTpl ? C.blue : C.l3, background: showSaveTpl ? `${C.blue}18` : "none", border:`1px solid ${showSaveTpl ? `${C.blue}60` : C.sep}`, borderRadius:7, padding:"3px 10px", cursor:"pointer", fontFamily:"inherit", fontWeight:500, transition:"all 0.15s" }}>
                    Salva modello
                  </button>
                )}
              </div>
            </div>

            {/* Template picker */}
            {showTplPicker && (
              <div style={{ background:C.s2, borderRadius:12, padding:"10px", marginBottom:8, display:"flex", flexDirection:"column", gap:5 }}>
                <div style={{ fontSize:11, color:C.l3, marginBottom:4, paddingLeft:2 }}>Seleziona un modello da applicare — i sottotask verranno aggiunti a quelli esistenti</div>
                {templates.map(tpl => (
                  <button key={tpl.id}
                    onClick={() => {
                      const newSubs = tpl.subtasks.map(s => ({ ...s, id: Date.now() + Math.random(), done: false }));
                      set("subtasks", [...form.subtasks, ...newSubs]);
                      setShowTplPicker(false);
                    }}
                    style={{ background:C.s1, border:`1px solid ${C.sep}`, borderRadius:9, padding:"9px 12px", cursor:"pointer", textAlign:"left", fontFamily:"inherit", transition:"all 0.12s" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = C.blue+"60"; e.currentTarget.style.background = C.s3; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = C.sep; e.currentTarget.style.background = C.s1; }}>
                    <div style={{ fontSize:13, fontWeight:600, color:C.l1, marginBottom:2 }}>{tpl.name}</div>
                    <div style={{ fontSize:11, color:C.l3 }}>{tpl.subtasks.length} voc{tpl.subtasks.length === 1 ? "e" : "i"}: {tpl.subtasks.slice(0,3).map(s => s.label).join(" · ")}{tpl.subtasks.length > 3 ? " …" : ""}</div>
                  </button>
                ))}
              </div>
            )}

            {/* Save as template */}
            {showSaveTpl && (
              <div style={{ background:`${C.blue}10`, border:`1px solid ${C.blue}30`, borderRadius:12, padding:"10px 12px", marginBottom:8, display:"flex", gap:8, alignItems:"center" }}>
                <input style={inp(C, { flex:1, fontSize:12, padding:"7px 10px" })}
                  value={saveTplName} placeholder="Nome del modello…"
                  autoFocus
                  onChange={e => setSaveTplName(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === "Enter") {
                      const n = saveTplName.trim();
                      if (n) { onSaveTemplate({ id:Date.now(), name:n, subtasks: form.subtasks.map(s => ({ id:Date.now()+Math.random(), label:s.label })) }); setSaveTplName(""); setShowSaveTpl(false); }
                    }
                    if (e.key === "Escape") setShowSaveTpl(false);
                  }} />
                <button
                  onClick={() => {
                    const n = saveTplName.trim();
                    if (n) { onSaveTemplate({ id:Date.now(), name:n, subtasks: form.subtasks.map(s => ({ id:Date.now()+Math.random(), label:s.label })) }); setSaveTplName(""); setShowSaveTpl(false); }
                  }}
                  style={{ background:C.blue, border:"none", color:"#fff", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit", flexShrink:0 }}>
                  Salva
                </button>
              </div>
            )}

            <div style={{ display:"flex", gap:8, marginBottom:8 }}>
              <input style={inp(C,{ flex:1 })} value={subIn} placeholder="Aggiungi voce…" onChange={e => setSubIn(e.target.value)} onKeyDown={e => e.key === "Enter" && addSubField()} />
              <button onClick={addSubField} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, width:42, cursor:"pointer", fontSize:20, fontWeight:300, flexShrink:0 }}>+</button>
            </div>
            {form.subtasks.length > 0 && (
              <div style={{ background:C.s2, borderRadius:12, overflow:"hidden" }}>
                {form.subtasks.map(function(s, idx) {
                  return (
                    <div key={s.id} style={{ display:"flex", alignItems:"center", padding:"10px 14px", borderBottom:idx < form.subtasks.length-1 ? `1px solid ${C.sep}` : "none", gap:10 }}>
                      {editingSub && editingSub.id === s.id ? (
                        <input
                          autoFocus
                          value={editingSub.value}
                          onChange={e => setEditingSub(es => ({ ...es, value: e.target.value }))}
                          onKeyDown={e => {
                            if (e.key === "Enter") {
                              const v = editingSub.value.trim();
                              if (v) set("subtasks", form.subtasks.map(x => x.id === s.id ? { ...x, label: v } : x));
                              setEditingSub(null);
                            }
                            if (e.key === "Escape") setEditingSub(null);
                          }}
                          onBlur={() => {
                            const v = editingSub.value.trim();
                            if (v) set("subtasks", form.subtasks.map(x => x.id === s.id ? { ...x, label: v } : x));
                            setEditingSub(null);
                          }}
                          style={{ flex:1, background:"none", border:"none", borderBottom:`1.5px solid ${C.blue}`, outline:"none", fontSize:14, color:C.l1, padding:"1px 2px", fontFamily:"inherit" }}
                        />
                      ) : (
                        <span
                          onClick={() => setEditingSub({ id: s.id, value: s.label })}
                          title="Clicca per modificare"
                          style={{ flex:1, fontSize:14, color:C.l1, cursor:"text" }}>
                          {s.label}
                        </span>
                      )}
                      <button onClick={() => set("subtasks", form.subtasks.filter(function(x){ return x.id !== s.id; }))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:18, opacity:0.7, padding:0 }}>−</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Notes */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Note</span>
            <input style={inp(C)} value={form.description} placeholder="Contesto, link, riferimenti…" onChange={e => set("description", e.target.value)} />
          </div>

          {/* Waiting */}
          <div style={{ marginBottom:18, background:form.waiting ? `${C.teal}12` : C.s2, borderRadius:12, padding:"12px 14px", border:"1.5px solid "+(form.waiting ? `${C.teal}50` : "transparent"), transition:"all 0.2s" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:form.waiting ? 10 : 0 }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:6, color:form.waiting ? C.teal : C.l1 }}>
                  <Icon name="pause" size={13} color="currentColor"/>
                  <div style={{ fontSize:13, fontWeight:600 }}>In attesa di qualcuno</div>
                </div>
                <div style={{ fontSize:11, color:C.l3, marginTop:2 }}>Non dipende da te — tocca ad altri muoversi</div>
              </div>

function SuggestionWhisper({ suggestions, onAction }) {
  const C = useContext(ThemeCtx);
  const [idx, setIdx] = useState(0);
  const [dismissed, setDismissed] = useState(() => {
    try { return localStorage.getItem("tm_v1_whisper_dismissed") === today; } catch { return false; }
  });
  const [localDismissed, setLocalDismissed] = useState([]);

  function dismiss() {
    try { localStorage.setItem("tm_v1_whisper_dismissed", today); } catch {}
    setDismissed(true);
  }

  const visible = suggestions.filter(s => !localDismissed.includes(s.id));
  if (!visible.length || dismissed) return null;
  const s = visible[Math.min(idx, visible.length - 1)];

  function handleAction(act) {
    if (onAction) onAction(act);
    setLocalDismissed(d => [...d, s.id]);
    setIdx(0);
  }

  return (
    <div style={{ background:C.s1, borderRadius:12, padding:"11px 14px", marginBottom:16, display:"flex", alignItems:"flex-start", gap:12, border:`1px solid ${C.sep}` }}>
      <span style={{ display:"flex", alignItems:"center", flexShrink:0, color: s.icon === "warning" ? C.orange : C.l3, marginTop:1 }}><Icon name={s.icon} size={14} color="currentColor"/></span>
      <div style={{ flex:1, minWidth:0 }}>
        <span style={{ fontSize:13, color:C.l2, lineHeight:1.45 }}>{s.text}</span>
        {(s.action || s.action2) && (
          <div style={{ display:"flex", gap:6, marginTop:8 }}>
            {s.action && (
              <button onClick={() => handleAction(s.action)}
                style={{ fontSize:11, fontWeight:600, color:C.red, background:C.red+"15", border:"none", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit" }}>
                {s.action.label}
              </button>
            )}
            {s.action2 && (
              <button onClick={() => handleAction(s.action2)}
                style={{ fontSize:11, fontWeight:600, color:C.l2, background:C.s3, border:"none", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit" }}>
                {s.action2.label}
              </button>
            )}
          </div>
        )}
      </div>
      <div style={{ display:"flex", gap:4, alignItems:"center", flexShrink:0 }}>
        {visible.length > 1 && (
          <>
            <button onClick={() => setIdx(i => (i-1+visible.length)%visible.length)} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:16, padding:"2px 5px" }}>‹</button>
            <span style={{ fontSize:11, color:C.l3 }}>{Math.min(idx,visible.length-1)+1}/{visible.length}</span>
            <button onClick={() => setIdx(i => (i+1)%visible.length)} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:16, padding:"2px 5px" }}>›</button>
          </>
        )}
        <button onClick={dismiss} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:14, padding:"2px 8px", marginLeft:4 }}>✕</button>
      </div>
    </div>
  );
}

function QuickCapture({ onAdd }) {
  const C = useContext(ThemeCtx);
  const [val, setVal]       = useState("");
  const [active, setActive] = useState(false);
  const [flash, setFlash]   = useState(false);

  function submit() {
    const t = val.trim();
    if (!t) return;
    onAdd(t);
    setVal("");
    setActive(false);
    setFlash(true);
    setTimeout(() => setFlash(false), 600);
  }

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ display:"flex", gap:10, alignItems:"center", background:flash ? `${C.green}18` : active ? C.s2 : C.s1, borderRadius:12, padding:"11px 16px", border:`1px solid ${flash ? `${C.green}60` : active ? `${C.blue}50` : C.sep}`, transition:"all 0.3s" }}>
        <span style={{ fontSize:20, color:flash ? C.green : active ? C.blue : C.l3, transition:"color 0.3s", flexShrink:0 }}>{flash ? "✓" : "+"}</span>
        <input
          value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") { setVal(""); setActive(false); } }}
          onFocus={() => setActive(true)}
          onBlur={() => setActive(false)}
          placeholder="Cattura un pensiero…"
          style={{ flex:1, background:"none", border:"none", outline:"none", color:C.l1, fontSize:15, fontFamily:"inherit" }}
        />
        {val && (
          <>
            <button onClick={() => { setVal(""); setActive(false); }}
              style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:14, padding:"0 2px", flexShrink:0, lineHeight:1 }}>✕</button>
            <button onClick={submit} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0 }}>↵</button>
          </>
        )}

      {active && <div style={{ fontSize:11, color:C.l3, marginTop:5, paddingLeft:4 }}>↵ per catturare · Esc per annullare · Classifica dopo in Inbox</div>}
    </div>
  );
}

// ── Snooze picker popup ──
function SnoozePickerPopup({ onSnooze, onClose }) {
  const C = useContext(ThemeCtx);
  const [custom, setCustom] = useState("");

  const now   = new Date();
  const nowH  = now.getHours();
  const nowM  = now.getMinutes();

  // Build quick chips: +30min, +1h, +2h, and fixed times still in the future
  const chips = [];
  function addRelative(label, mins) {
    const d = new Date(now.getTime() + mins * 60000);
    chips.push({ label, value: d.getHours() + ":" + String(d.getMinutes()).padStart(2,"0"), ts: d.getTime() });
  }
  function addFixed(h, label) {
    if (h * 60 > nowH * 60 + nowM + 15) {
      const d = new Date(now); d.setHours(h, 0, 0, 0);
      chips.push({ label, value: h + ":00", ts: d.getTime() });
    }
  }
  addRelative("+30 min", 30);
  addRelative("+1 ora", 60);
  addRelative("+2 ore", 120);
  addFixed(10, "10:00");
  addFixed(12, "12:00");
  addFixed(14, "14:00");
  addFixed(16, "16:00");
  addFixed(18, "18:00");

  function handleCustom() {
    const m = custom.match(/^(\d{1,2}):(\d{2})$/);
    if (!m) return;
    const h = parseInt(m[1]), mn = parseInt(m[2]);
    if (h > 23 || mn > 59) return;
    const d = new Date(now); d.setHours(h, mn, 0, 0);
    if (d.getTime() <= now.getTime()) return;
    onSnooze(d.getTime());
  }

  return (
    <div onClick={e => e.stopPropagation()}
      style={{ position:"absolute", right:0, top:"calc(100% + 6px)", zIndex:100, background:C.s1, border:"1px solid "+C.sep, borderRadius:14, padding:"14px 16px", boxShadow:"0 8px 32px rgba(0,0,0,0.22)", minWidth:220 }}>
      <div style={{ fontSize:11, fontWeight:700, color:C.l3, letterSpacing:0.8, marginBottom:10 }}>RIMANDA ALLE</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 }}>
        {chips.map(c => (
          <button key={c.value} onClick={() => onSnooze(c.ts)}
            style={{ fontSize:12, fontWeight:600, color:C.l1, background:C.s2, border:"1px solid "+C.sep, borderRadius:8, padding:"5px 10px", cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>
            {c.label}
          </button>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, alignItems:"center" }}>
        <input value={custom} onChange={e => setCustom(e.target.value)} placeholder="HH:MM"
          onKeyDown={e => { if (e.key === "Enter") handleCustom(); if (e.key === "Escape") onClose(); }}
          style={{ flex:1, fontSize:13, color:C.l1, background:C.s2, border:"1px solid "+C.sep, borderRadius:8, padding:"6px 10px", outline:"none", fontFamily:"inherit" }} />
        <button onClick={handleCustom}
          style={{ fontSize:12, fontWeight:700, color:"#fff", background:C.blue, border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontFamily:"inherit" }}>
          OK
        </button>
      </div>
    </div>
  );
}

function AttachmentSection({ task, onAdd, onRemove }) {
  const C        = useContext(ThemeCtx);
  const fileRef  = useRef(null);
  const [viewing, setViewing]   = useState(null);
  const [loading, setLoading]   = useState(false);

  const fmtSize = bytes => bytes < 1024*1024
    ? `${(bytes/1024).toFixed(0)} KB`
    : `${(bytes/1024/1024).toFixed(1)} MB`;

  function handleFiles(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setLoading(true);
    let chain = Promise.resolve();
    files.forEach(file => {
      chain = chain.then(() => {
        const id   = `att_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const meta = { id, name:file.name, type:file.type, size:file.size, createdAt:new Date().toISOString() };
        return idbSave({ id, blob:file }).then(() => { onAdd(task.id, meta); });
      });
    });
    chain.then(() => { setLoading(false); e.target.value = ""; });
  }

  function handleRemove(att) {
    onRemove(task.id, att);
  }

  const iconFor = type => type.startsWith("image/") ? "blocks" : type === "application/pdf" ? "archive" : "dot-info";

  return (
    <div style={{ marginBottom:12 }}>
      <input ref={fileRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style={{ display:"none" }} onChange={handleFiles} />
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
        <span style={{ fontSize:12, fontWeight:500, color:C.l2 }}>Allegati</span>
        <button onClick={() => fileRef.current.click()}
          style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:C.blue, background:`${C.blue}18`, border:"none", borderRadius:7, padding:"3px 10px", cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>
          {loading ? "…" : <><Icon name="inbox" size={10} color="currentColor"/> Allega</>}
        </button>
      </div>
      {task.attachments.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {task.attachments.map(att => (
            <div key={att.id} style={{ display:"flex", alignItems:"center", gap:8, background:C.s2, borderRadius:9, padding:"7px 10px" }}>
              <span style={{ color:C.l3, flexShrink:0 }}><Icon name={iconFor(att.type)} size={12} color="currentColor"/></span>
              <button onClick={() => setViewing(att)}
                style={{ flex:1, background:"none", border:"none", textAlign:"left", cursor:"pointer", padding:0, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:500, color:C.l1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{att.name}</div>
                <div style={{ fontSize:10, color:C.l3 }}>{fmtSize(att.size)}</div>
              </button>
                <button onClick={() => handleRemove(att)}
                  style={{ background:"none", border:"none", color:C.red, cursor:"pointer", opacity:0.4, padding:"2px 4px", flexShrink:0, fontSize:14, lineHeight:1, fontFamily:"inherit" }}
                  onMouseEnter={e => e.currentTarget.style.opacity="1"}
                  onMouseLeave={e => e.currentTarget.style.opacity="0.4"}>
                  ✕
                </button>
            </div>
          ))}
        </div>
      )}
      {task.attachments.length === 0 && (
        <div style={{ fontSize:11, color:C.l3, textAlign:"center", padding:"10px 0" }}>Nessun allegato</div>
      )}
      {viewing && <AttachmentViewer attachment={viewing} onClose={() => setViewing(null)} />}
    </div>
  );
}

  );
}

function EndOfDayReview({ tasks, onClose, onDecide, onClassifyInbox }) {
  const C = useContext(ThemeCtx);
  const [decisions, setDecisions]       = useState({});  // task decisions
  const [inboxDec, setInboxDec]         = useState({});  // inbox decisions
  const [customDate, setCustomDate]     = useState({});
  const [classifying, setClassifying]   = useState(null); // inbox task being classified
  const [committed, setCommitted]       = useState(false);

  // Section 1 — task aperti oggi o scaduti
  const reviewItems = tasks.filter(t =>
    t.progress < 100 && !t.waiting && t.type !== "inbox" &&
    (computeHz(t) === "today" || (t.end && workDiff(today, t.end) < 0))
  );

  // Section 2 — inbox non elaborata
  const inboxItems = tasks.filter(t => t.type === "inbox" && t.progress < 100);

  const decidedTasks  = Object.keys(decisions).length;
  const decidedInbox  = Object.keys(inboxDec).length;
  const total         = reviewItems.length + inboxItems.length;
  const decided       = decidedTasks + decidedInbox;
  const allDone       = total > 0 && decided === total;
  const pct           = total ? Math.round(decided / total * 100) : 100;

  const decide      = (tid, choice) => setDecisions(d => ({ ...d, [tid]: choice }));
  const decideInbox = (tid, choice) => setInboxDec(d => ({ ...d, [tid]: choice }));

  // Called when user classifies an inbox task from within the review
  function handleInboxClassified(form) {
    onClassifyInbox(form);                       // update task in App state
    decideInbox(form.id, "classified");          // mark as decided in review
    setClassifying(null);
  }

  function commit() {
    // Apply task decisions
    reviewItems.forEach(t => {
      const d = decisions[t.id];
      if (!d) return;
      if (d === "done")                onDecide(t.id, "done",     null);
      else if (d === "tomorrow")       onDecide(t.id, "postpone", T(1));
      else if (d.startsWith("date:"))  onDecide(t.id, "postpone", d.replace("date:", ""));
      // "drop" → leave as-is, no call needed
    });
    setCommitted(true);
    setTimeout(onClose, 1800);
  }

  const now = new Date().toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });

  // ── Closing animation ──
  if (committed) return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div style={{ textAlign:"center", color:"#fff" }}>
        <div style={{ fontSize:52, marginBottom:16 }}>✦</div>
        <div style={{ fontSize:22, fontWeight:700, letterSpacing:-0.5 }}>Giornata chiusa.</div>
        <div style={{ fontSize:14, color:"rgba(255,255,255,0.5)", marginTop:8 }}>La mente è libera. A domani.</div>
      </div>
    </div>
  );

  // ── Empty state ──
  if (total === 0) return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.s1, borderRadius:24, padding:"36px 40px", maxWidth:400, width:"90vw", textAlign:"center", boxShadow:"0 32px 80px rgba(0,0,0,0.5)" }}>
        <div style={{ fontSize:40, marginBottom:16 }}>✦</div>
        <div style={{ fontSize:20, fontWeight:700, color:C.l1 }}>Niente da chiudere.</div>
        <div style={{ fontSize:14, color:C.l3, marginTop:8, marginBottom:24 }}>Agenda vuota, inbox pulita. Ottimo lavoro.</div>
        <button onClick={onClose} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:12, padding:"11px 28px", fontWeight:600, fontSize:15, cursor:"pointer" }}>Chiudi</button>
      </div>
    </div>
  );

  // ── Classification sub-form (renders on top of review) ──
  if (classifying) return (
    <TaskForm
      initial={{ ...classifying }}
      onSave={handleInboxClassified}
      onClose={() => setClassifying(null)}
    />
  );

  // ── Section label helper ──
  const SectionLabel = ({ color, label, count }) => (
    <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10 }}>
      <div style={{ width:5, height:5, borderRadius:"50%", background:color, flexShrink:0 }} />
      <span style={{ fontSize:11, fontWeight:700, color, letterSpacing:1.1 }}>{label.toUpperCase()}</span>
      <span style={{ fontSize:12, color:C.l3 }}>{count}</span>
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(24px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>

function parseDate(str) {
  if (!str) return null;
  var p = str.split("-");
  return p.length === 3 ? new Date(+p[0], +p[1]-1, +p[2]) : null;
}
function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a, b) { return Math.round((b - a) / 86400000); }

function GanttView({ tasks, onSelect }) {
  const C = useContext(ThemeCtx);
  const [offset, setOffset] = useState(0);

  const WEEKS = 12;
  const LABEL_W = 180;
  const BAR_H = 20;
  const ROW_H = 46;
  const HEAD_H = 32;
  const SUBH_H = 22;

  function fmtShort(d) { return d.toLocaleDateString("it-IT", { day:"numeric", month:"short" }); }
  function fmtMonth(d) { return d.toLocaleDateString("it-IT", { month:"long" }); }

  const todayD = parseDate(today);
  const winStart = addDays(todayD, offset * 7 - 28);
  const winEnd = addDays(winStart, WEEKS * 7);
  const totalDays = WEEKS * 7;

  // split projects
  const planned = [], unplanned = [];
  tasks.forEach(function(t) {
    if (t.progress === 100) return;
    let s = parseDate(t.start), e = parseDate(t.end);
    if (s && e && e >= s) planned.push(t);
    else unplanned.push(t);
  });
  planned.sort(function(a,b){ return parseDate(a.start) - parseDate(b.start); });

  // ── month / week markers ──
  const months = [];
  let mc = new Date(winStart.getFullYear(), winStart.getMonth(), 1);
  while (mc <= winEnd) {
    const pct = diffDays(winStart, mc) / totalDays * 100;
    if (pct < 100) months.push({ pct: Math.max(0, pct), label: fmtMonth(mc) });
    mc = new Date(mc.getFullYear(), mc.getMonth()+1, 1);
  }

  const weeks = [];
  let wc = new Date(winStart);
  const wd = wc.getDay();
  wc = addDays(wc, wd === 1 ? 0 : wd === 0 ? 1 : 8 - wd);
  while (wc <= winEnd) {
    const wp = diffDays(winStart, wc) / totalDays * 100;
    if (wp >= 0 && wp <= 100) weeks.push({ pct: wp, label: fmtShort(wc) });
    wc = addDays(wc, 7);
  }

  const todayPct = diffDays(winStart, todayD) / totalDays * 100;
  const showToday = todayPct >= 0 && todayPct <= 100;

  const sep = "1px solid " + C.sep;

  // ── bar geometry from a task ──
  function barGeom(task) {
    let s = parseDate(task.start);
    let e = parseDate(task.end);
    const pctS = diffDays(winStart, s) / totalDays * 100;
    const pctE = diffDays(winStart, addDays(e, 1)) / totalDays * 100;
    const left = Math.max(0, pctS);
    const right = Math.min(100, pctE);
    return { left: left, width: Math.max(0.5, right - left), clipped: pctS < 0 || pctE > 100 };
  }

  return (
    <div style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>

      {/* Controls */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        <button onClick={() => setOffset(o => o-2)}
          style={{ background:C.s2, border:"none", borderRadius:8, width:30, height:30, cursor:"pointer", color:C.l2, fontSize:17, lineHeight:1, fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
        <button onClick={() => setOffset(0)}
          style={{ background: offset===0 ? `${C.blue}22` : C.s2, border:"none", borderRadius:8, padding:"5px 14px", cursor:"pointer", color: offset===0 ? C.blue : C.l2, fontSize:12, fontWeight:600, fontFamily:"inherit" }}>Oggi</button>
        <button onClick={() => setOffset(o => o+2)}
          style={{ background:C.s2, border:"none", borderRadius:8, width:30, height:30, cursor:"pointer", color:C.l2, fontSize:17, lineHeight:1, fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
        <span style={{ fontSize:12, color:C.l3 }}>{fmtShort(winStart)} → {fmtShort(winEnd)}</span>
      </div>

      {/* Timeline table */}

// ── Storage usage ──
function getStorageUsage() {
  try {
    const keys = [LS_KEY, LS_TRASH, LS_ATT_TRASH, LS_TEMPLATES, LS_EVENT_LOG];
    let total = 0;
    const breakdown = {};
    keys.forEach(k => {
      const v = localStorage.getItem(k) || "";
      const bytes = new Blob([v]).size;
      breakdown[k] = bytes;
      total += bytes;
    });
    // localStorage limit is typically 5MB per origin
    const LIMIT = 5 * 1024 * 1024;
    return { total, pct: Math.round(total / LIMIT * 100), breakdown, limit: LIMIT };
  } catch { return null; }
}

function StorageWarning({ onExport, onPurgeDone }) {
  const C = useContext(ThemeCtx);
  const [usage, setUsage] = useState(null);
  const [dismissed, setDismissed] = useState(false);

  useEffect(() => {
    const u = getStorageUsage();
    setUsage(u);
  }, []);

  if (!usage || dismissed || usage.pct < 75) return null;

  const isCritical = usage.pct >= 90;
  const color      = isCritical ? C.red : C.orange;
  const bg         = isCritical ? C.red + "14" : C.orange + "14";
  const border     = isCritical ? C.red + "40" : C.orange + "40";

  const fmt = b => b >= 1024 * 1024
    ? (b / 1024 / 1024).toFixed(1) + " MB"
    : Math.round(b / 1024) + " KB";

  // Find biggest contributor
  const topKey = Object.entries(usage.breakdown).sort((a,b) => b[1]-a[1])[0];
  const topLabel = topKey && topKey[0] === LS_KEY ? "task attivi"
    : topKey && topKey[0] === LS_TRASH ? "cestino"
    : topKey && topKey[0] === LS_ATT_TRASH ? "allegati nel cestino"
    : "log eventi";

  return (
    <div style={{ margin:"0 0 16px 0", background:bg, border:"1px solid " + border, borderRadius:14, padding:"12px 14px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom: isCritical ? 10 : 8 }}>
        <span style={{ flexShrink:0, display:"flex", alignItems:"center", color }}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </span>
        <div style={{ flex:1 }}>
          <span style={{ fontSize:13, fontWeight:600, color }}>
            {isCritical ? "Memoria quasi esaurita" : "Memoria in esaurimento"} — {usage.pct}% usato ({fmt(usage.total)} / 5 MB)
          </span>
          <div style={{ fontSize:12, color:C.l2, marginTop:2 }}>
            La parte più pesante è {topLabel} ({fmt(topKey[1])}). Esporta un backup e pulisci i completati.
          </div>
        </div>
        <button onClick={() => setDismissed(true)}
          style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:18, padding:"0 2px", lineHeight:1, flexShrink:0 }}>×</button>

        <div style={{ height:"100%", width: usage.pct + "%", background:color, borderRadius:2, transition:"width 0.3s" }} />
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={() => { onExport(); setDismissed(true); }}
          style={{ fontSize:12, fontWeight:700, color:"#fff", background:color, border:"none", borderRadius:9, padding:"6px 13px", cursor:"pointer", fontFamily:"inherit" }}>
          Esporta backup
        </button>

          style={{ fontSize:12, fontWeight:600, color:C.l2, background:C.s3, border:"none", borderRadius:9, padding:"6px 13px", cursor:"pointer", fontFamily:"inherit" }}>
          Svuota completati
        </button>
      </div>
    </div>
  );
}

// ── Day progress hook (8:00–18:00) ──
function useDayProgress() {
  function calc() {
    const now  = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const start = 8  * 60; // 8:00
    const end   = 18 * 60; // 18:00
    if (mins <= start) return 0;
    if (mins >= end)   return 1;
    return (mins - start) / (end - start);
  }
  const [pct, setPct] = useState(calc);
  useEffect(() => {
    const id = setInterval(() => setPct(calc()), 60000);
    return () => clearInterval(id);
  }, []);
  return pct;
}

function BackupReminder({ onExport }) {
  const C = useContext(ThemeCtx);
  const SNOOZE_KEY = "tm_v1_backup_snoozed";
  const [visible, setVisible] = useState(() => {
    try {
      // Snoozed oggi?
      const snoozed = localStorage.getItem(SNOOZE_KEY);
      if (snoozed === today) return false;
      // Mai esportato?
      const last = localStorage.getItem(LS_LAST_EXPORT);
      if (!last) {
        // Mostra solo se ci sono dati (almeno 3 task)
        try {
          const tasks = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
          return tasks.length >= 3;
        } catch { return false; }
      }
      // Esportato più di 7 giorni fa?
      const daysSince = Math.floor((Date.now() - parseInt(last)) / 86400000);
      return daysSince >= 7;
    } catch { return false; }
  });

  if (!visible) return null;

  function handleExport() {
    onExport();
    setVisible(false);
  }
  function handleSnooze() {
    try { localStorage.setItem(SNOOZE_KEY, today); } catch {}
    setVisible(false);
  }

  return (
    <div style={{ margin:"0 0 16px 0", background:`${C.yellow}14`, border:`1px solid ${C.yellow}40`, borderRadius:14, padding:"11px 14px", display:"flex", alignItems:"center", gap:10 }}>

          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </span>
      <div style={{ flex:1, minWidth:0 }}>
        <span style={{ fontSize:13, color:C.l1, fontWeight:500 }}>
          {(() => {
            try {
              const last = localStorage.getItem(LS_LAST_EXPORT);
              if (!last) return "Non hai mai esportato un backup.";
              const days = Math.floor((Date.now() - parseInt(last)) / 86400000);
              const when = days === 1 ? "ieri" : days + " giorni fa";
              return "Ultimo backup " + when + ". I dati sono solo nel browser.";
            } catch { return "Non hai mai esportato un backup."; }
          })()}
        </span>
      </div>
      <button onClick={handleExport}
        style={{ background:C.yellow, border:"none", color:"#000", borderRadius:9, padding:"6px 13px", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit", flexShrink:0, whiteSpace:"nowrap" }}>

        style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:18, padding:"0 2px", lineHeight:1, flexShrink:0 }}>×</button>
    </div>
  );
}

// ── IndexedDB — attachment storage ──
const IDB_NAME  = "tm_files_v1";
const IDB_STORE = "attachments";

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE))
        db.createObjectStore(IDB_STORE, { keyPath:"id" });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}

function idbSave(record) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(record);
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function(e) { reject(e.target.error); };
    });
  });
}

function idbGet(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction(IDB_STORE, "readonly");
      var req = tx.objectStore(IDB_STORE).get(id);
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  });
}

function idbDelete(id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function(e) { reject(e.target.error); };
    });
  });
}

const HZ = {
  today:   { label:"Oggi"               },
  week:    { label:"Questa settimana"   },
  month:   { label:"Prossime settimane" },
  backlog: { label:"Backlog"            },
};
const HZ_COLORS = { today:"red", week:"orange", month:"blue", backlog:"muted" };
const hzColor = (hz, C) => C[HZ_COLORS[hz]] || C.muted;

const PALETTE = ["#FF453A","#FF9F0A","#FFD60A","#32D74B","#0A84FF","#BF5AF2","#64D2FF","#FF6961"];

const DURATIONS = [
  { id:"quick", icon:"bolt",      label:"< 30 min",     hours:0.5 },
  { id:"hour1", icon:"clock",     label:"1 ora",         hours:1   },
  { id:"hour2", icon:"timer",     label:"2 ore",         hours:2   },
  { id:"block", icon:"blocks",    label:"Mezza giornata",hours:4   },
  { id:"deep",  icon:"repeat",    label:"Più sessioni",  hours:0   },
];
const ACTION_DURATIONS = ["quick","hour1","hour2","block"];
const DURATION_MAP = Object.fromEntries(DURATIONS.map(d => [d.id, d]));

const MATRIX = [
  { u:1,i:2, label:"Pianifica",  sub:"Importante, non urgente",    color:DARK.blue,   hz:"week",    q:"Q2" },
  { u:2,i:2, label:"Fai subito", sub:"Urgente e importante",       color:DARK.red,    hz:"today",   q:"Q1" },
  { u:1,i:1, label:"Parcheggia", sub:"Non urgente, non importante", color:DARK.muted,  hz:"backlog", q:"Q4" },
  { u:2,i:1, label:"Sbriga",     sub:"Urgente ma non importante",  color:DARK.purple, hz:"week",    q:"Q3" },
];

const getCell = (u,i) => MATRIX.find(c=>c.u===u&&c.i===i);
const baseHz  = (u,i) => { const c = getCell(u,i); return c ? c.hz : "backlog"; };
const RANK    = {backlog:0,month:1,week:2,today:3};
const maxHz   = (a,b) => RANK[a]>RANK[b]?a:b;

const today   = new Date().toISOString().split("T")[0];
const T       = n => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };

function workDiff(a, b) {
  const start = new Date(a < b ? a : b);
  const end   = new Date(a < b ? b : a);
  let count = 0;
  const cur = new Date(start);
  while (cur < end) {
    const d = cur.getDay();
    if (d !== 0 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return a <= b ? count : -count;
}

const _fmt    = new Intl.DateTimeFormat("it-IT", { day:"2-digit", month:"short" });
const fmtDate = d => _fmt.format(new Date(d));

function computeHz(item) {
  if (item.progress >= 100) return "done";
  if (item.type === "inbox") return "inbox";
  const base = baseHz(item.urgency, item.importance);
  const dL   = item.end ? workDiff(today, item.end) : 999;
  let dHz = base;
  if (dL <= 0)        dHz = "today";
  else if (dL <= 3)   dHz = maxHz(base, "today");
  else if (dL <= 14)  dHz = maxHz(base, "week");
  const risk = dL > 0 ? (100 - item.progress) / dL : 99;
  let rHz = dHz;
  if (risk > 20) rHz = maxHz(dHz, "today");
  else if (risk > 8) rHz = maxHz(dHz, "week");
  return maxHz(dHz, rHz);
}

function getRisk(item) {
  if (item.progress >= 100 || !item.end) return null;
  const dL = workDiff(today, item.end);
  if (dL <= 0) return null;
  const idx = (100 - item.progress) / dL;
  const C = DARK; // colors resolved at call site when needed
  if (idx > 20) return { level:"critical", colorKey:"red",    label:"Rischio alto", tip:`${Math.round(idx)} pt/g` };
  if (idx > 8)  return { level:"warning",  colorKey:"orange", label:"Attenzione",   tip:`${Math.round(idx)} pt/g` };
  return null;
}

function isEscalated(item) {
  if (!item.urgency || !item.importance || !item.end) return false;
  return RANK[computeHz(item)] > RANK[baseHz(item.urgency, item.importance)];
}

function computeSuggestions({ todayItems, inboxItems, projects, backlogItems, waitingItems, load, freeHours }) {
  const out = [];
  const isThursday = new Date().getDay() === 4;
  if (load > freeHours)
    out.push({ id:"overload", icon:"warning", text:`Oggi hai ~${Math.round(load)}h di lavoro stimato su ${freeHours}h disponibili. Considera di spostare qualcosa.` });
  if (todayItems.length > 5)
    out.push({ id:"today_overflow", icon:"warning", text:`${todayItems.length} priorità oggi. La working memory gestisce al meglio 3–4 unità. Valuta cosa posticipare.` });
  if (inboxItems.length > 3)
    out.push({ id:"inbox", icon:"inbox", text:`${inboxItems.length} task non classificati in inbox. 5 minuti di elaborazione riducono il carico cognitivo residuo.` });
  const orphans = projects.filter(p => p.subtasks.length > 0 && !p.subtasks.find(s => s.next && !s.done));
  if (orphans.length > 0)
    out.push({ id:"orphan", icon:"layers", text:`${orphans.length} progett${orphans.length > 1 ? "i" : "o"} senza azione "Prossimo". Senza next action un progetto rimane bloccato nella mente.` });
  if (backlogItems.length > 5)
    out.push({ id:"backlog", icon:"archive", text:`${backlogItems.length} task in backlog. Ogni loop aperto consuma risorse cognitive. Parcheggia quello che non farai mai.` });
  if (isThursday && waitingItems.length > 0)
    out.push({ id:"waiting_review", icon:"pause", text:`È giovedì — hai ${waitingItems.length} task in attesa. Controlla se qualcuno si è mosso e aggiorna lo stato.` });
  else if (!isThursday && waitingItems.length > 0) {
    const stale = waitingItems.filter(t => t.waitingSince && workDiff(t.waitingSince, today) > 7);
    if (stale.length > 0)
      out.push({ id:"waiting_stale", icon:"pause", text:`${stale.length} task in attesa da oltre 7 giorni lavorativi. Giovedì è il momento per fare il punto.` });
  }
  return out;
}

const calcProg  = subs => subs.length ? Math.round(subs.filter(s => s.done).length / subs.length * 100) : 0;
const EMPTY_TASK = { title:"", type:"action", color:PALETTE[4], urgency:null, importance:null, start:"", end:"", progress:0, duration:"quick", description:"", subtasks:[], attachments:[], waiting:false, waitingFor:"", waitingSince:"" };

// ── Schema normalizer — merges saved data with current EMPTY_TASK defaults ──
// Ensures tasks saved by older versions of the app get new fields filled in
function normalizeTask(raw) {
  return { ...EMPTY_TASK, ...raw,
    subtasks:    (raw.subtasks    || []).map(s => ({ done:false, next:false, ...s })),
    attachments: (raw.attachments || []),
  };
}

// ── Shared style helpers ──
const inp  = (C, ex={}) => ({ width:"100%", background:C.s2, border:"none", borderRadius:10, padding:"11px 14px", color:C.l1, fontSize:15, outline:"none", boxSizing:"border-box", colorScheme: C === LIGHT ? "light" : "dark", fontFamily:"inherit", ...ex });
const slbl = C => ({ fontSize:13, color:C.l2, fontWeight:500, display:"block", marginBottom:6 });
const btn  = (C, extra={}) => ({ border:"none", borderRadius:8, cursor:"pointer", fontFamily:"inherit", ...extra });
const pill = (color, extra={}) => ({ fontSize:11, fontWeight:600, padding:"2px 7px", borderRadius:6, background:color+"22", color, display:"inline-flex", alignItems:"center", gap:3, ...extra });
const card = (C, extra={}) => ({ background:C.s1, borderRadius:16, overflow:"hidden", boxShadow:C.shadow, ...extra });

function Sheet({ onClose, children, width=480 }) {
  const C = useContext(ThemeCtx);
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:C.s1, borderRadius:20, padding:24, width, maxWidth:"95vw", maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 80px rgba(0,0,0,0.5)" }}>
        {children}
      </div>
    </div>
  );
}

// ── Icon — outline SVG icons, same register as sun/moon ──
function Icon({ name, size=14, color="currentColor", style={} }) {
  const props = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:color, strokeWidth:1.75, strokeLinecap:"round", strokeLinejoin:"round", style };
  switch (name) {
    case "bolt":      return <svg {...props}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
    case "layers":    return <svg {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
    case "clock":     return <svg {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    case "hourglass": return <svg {...props}><path d="M5 2h14"/><path d="M5 22h14"/><path d="M5 2a15 15 0 0 0 14 10A15 15 0 0 0 5 22"/><path d="M19 2a15 15 0 0 1-14 10A15 15 0 0 1 19 22"/></svg>;
    case "pause":     return <svg {...props}><circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>;
    case "alert":     return <svg {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    case "warning":   return <svg {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    case "inbox":     return <svg {...props}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>;
    case "archive":   return <svg {...props}><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>;
    case "dot-info":  return <svg {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    case "timer":     return <svg {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    case "blocks":    return <svg {...props}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>;
    case "repeat":    return <svg {...props}><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>;
    default:          return <svg {...props}><circle cx="12" cy="12" r="2"/></svg>;
  }
}

function TaskForm({ initial, onSave, onClose, isEdit=false }) {
  const C   = useContext(ThemeCtx);
  const lbl = slbl(C);
  const [form, setForm] = useState(initial);
  const [subIn, setSubIn] = useState("");
  const set = (k,v) => setForm(f => ({ ...f, [k]:v }));
  const ok  = form.title.trim() && (form.type === "inbox" || form.type === "action" || form.end);

  const handleSave = () => {
    if (!ok) return;
    const hz = form.urgency && form.importance ? baseHz(form.urgency, form.importance) : "backlog";
    onSave({ ...form, horizon:hz });
  };

  function addSubField() {
    const l = subIn.trim();
    if (!l) return;
    set("subtasks", [...form.subtasks, { id:Date.now(), label:l, done:false }]);
    setSubIn("");
  }

  const cell = form.urgency && form.importance ? getCell(form.urgency, form.importance) : null;

  return (
    <Sheet onClose={onClose} width={500}>

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
        <div style={{ fontSize:17, fontWeight:700, color:C.l1 }}>{isEdit ? "Modifica task" : "Nuovo task"}</div>
        <button onClick={onClose} style={{ background:C.s3, border:"none", color:C.l2, borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
      </div>

      {/* Title */}
      <div style={{ marginBottom:16 }}>
        <span style={lbl}>Titolo</span>
        <input style={inp(C)} value={form.title} placeholder="Es. Preparare presentazione…" autoFocus onChange={e => set("title", e.target.value)} onKeyDown={e => e.key === "Enter" && handleSave()} />
      </div>

      {/* Matrix — urgency × importance */}
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={lbl}>Priorità <span style={{ fontWeight:400, color:C.l3 }}>(urgenza × importanza)</span></span>
          {form.type === "inbox" && (
            <span style={{ fontSize:11, color:C.teal, fontWeight:500 }}>classificato come inbox</span>
          )}
        </div>
        <div style={{ display:"flex", paddingLeft:44, marginBottom:4 }}>
          {["Non urgente","Urgente"].map(l => (
            <div key={l} style={{ flex:1, textAlign:"center", fontSize:9, color:C.l3, fontWeight:600, letterSpacing:0.7 }}>{l.toUpperCase()}</div>
          ))}
        </div>
        <div style={{ display:"flex", gap:5 }}>
          <div style={{ display:"flex", flexDirection:"column", width:40, gap:4 }}>
            {["Alta","Bassa"].map(l => (
              <div key={l} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:6, minHeight:64 }}>
                <span style={{ fontSize:9, color:C.l3, fontWeight:600, letterSpacing:0.7 }}>{l.toUpperCase()}</span>
              </div>
            ))}
          </div>
          <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 1fr", gap:5 }}>
            {MATRIX.map(c => {
              var isSel = form.urgency === c.u && form.importance === c.i;
              return (
                <div key={c.u+""+c.i}
                  onClick={() => setForm(f => ({ ...f, urgency:c.u, importance:c.i, type: f.type === "inbox" ? "action" : f.type }))}
                  style={{ background:isSel ? c.color+"28" : C.s2, borderRadius:10, padding:"10px 12px", cursor:"pointer", border:"1.5px solid "+(isSel ? c.color : "transparent"), transition:"all 0.15s", minHeight:64, display:"flex", flexDirection:"column", justifyContent:"center", gap:2 }}
                  onMouseEnter={function(e){ if (!isSel) e.currentTarget.style.background = C.s3; }}
                  onMouseLeave={function(e){ if (!isSel) e.currentTarget.style.background = C.s2; }}>
                  <div style={{ fontSize:12, fontWeight:700, color:isSel ? c.color : C.l1 }}>{c.label}</div>
                  <div style={{ fontSize:10, color:C.l3, lineHeight:1.35 }}>{c.sub}</div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Selected cell hint + inbox escape hatch */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:7 }}>
          <div>
            {cell && (
              <span style={{ fontSize:11, color:cell.color, fontWeight:500 }}>
                → agenda: {HZ[cell.hz] ? HZ[cell.hz].label : ""}
              </span>
            )}
            {!cell && form.type !== "inbox" && (
              <span style={{ fontSize:11, color:C.l3 }}>Seleziona un quadrante per classificare</span>
            )}
          </div>
          <button
            onClick={() => setForm(f => ({ ...f, type:"inbox", urgency:null, importance:null }))}
            style={{ background:"none", border:"none", fontSize:11, color:form.type === "inbox" ? C.teal : C.l3, cursor:"pointer", padding:0, fontFamily:"inherit", fontWeight: form.type === "inbox" ? 600 : 400 }}>
            {form.type === "inbox" ? "✓ Classifica dopo" : "Classifica dopo →"}
          </button>
        </div>
      </div>

      {form.type !== "inbox" && (
        <>
          {/* Type */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Tipo</span>
            <div style={{ display:"flex", gap:6 }}>
              {[["action","bolt","Azione","Una sessione"],["project","layers","Progetto","Più sessioni"]].map(function(arr) {
                var t=arr[0], ic=arr[1], l=arr[2], d=arr[3];
                return (
                  <div key={t} onClick={() => set("type", t)} style={{ flex:1, padding:"10px 12px", borderRadius:12, background:form.type === t ? `${C.blue}20` : C.s2, border:"1.5px solid "+(form.type === t ? C.blue : "transparent"), cursor:"pointer", transition:"all 0.15s" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2, color:form.type === t ? C.blue : C.l1 }}>
                      <Icon name={ic} size={13} color="currentColor"/>
                      <span style={{ fontSize:13, fontWeight:600 }}>{l}</span>
                    </div>
                    <div style={{ fontSize:11, color:C.l3 }}>{d}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Duration */}
          {form.type === "action" && (
            <div style={{ marginBottom:14 }}>
              <span style={lbl}>Impegno stimato</span>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {DURATIONS.filter(function(d){ return ACTION_DURATIONS.indexOf(d.id) >= 0; }).map(d => (
                  <div key={d.id} onClick={() => set("duration", d.id)} style={{ flex:1, padding:"9px 10px", borderRadius:10, background:form.duration === d.id ? `${C.blue}20` : C.s2, border:"1.5px solid "+(form.duration === d.id ? C.blue : "transparent"), cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
                    <div style={{ display:"flex", justifyContent:"center", marginBottom:4, color:form.duration === d.id ? C.blue : C.l3 }}><Icon name={d.icon} size={14} color="currentColor" /></div>
                    <div style={{ fontSize:11, fontWeight:600, color:form.duration === d.id ? C.blue : C.l1 }}>{d.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Dates */}
          {form.type === "action" ? (
            <div style={{ marginBottom:14 }}>
              <span style={lbl}>Scadenza <span style={{ color:C.l3, fontWeight:400 }}>(opzionale — alimenta l'urgenza automatica)</span></span>
              <input type="date" style={inp(C)} value={form.end} onChange={e => set("end", e.target.value)} />
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
              <div><span style={lbl}>Inizio</span><input type="date" style={inp(C)} value={form.start} onChange={e => set("start", e.target.value)} /></div>
              <div><span style={lbl}>Scadenza</span><input type="date" style={inp(C)} value={form.end} onChange={e => set("end", e.target.value)} /></div>
            </div>
          )}

          {/* Color */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Colore identità</span>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              {PALETTE.slice(0, 7).map(c => (
                <div key={c} onClick={() => set("color", c)} style={{ width:22, height:22, borderRadius:"50%", background:c, cursor:"pointer", flexShrink:0, boxShadow:form.color === c ? `0 0 0 3px ${C.bg},0 0 0 5px ${c}` : "none", transition:"box-shadow 0.2s" }} />
              ))}
              <label title="Colore personalizzato" style={{ width:22, height:22, borderRadius:"50%", background:PALETTE.indexOf(form.color) === -1 ? form.color : C.s3, cursor:"pointer", flexShrink:0, boxShadow:PALETTE.indexOf(form.color) === -1 ? `0 0 0 3px ${C.bg},0 0 0 5px ${form.color}` : "none", transition:"box-shadow 0.2s", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", border:"1.5px dashed "+C.l3 }}>
                <input type="color" value={form.color} onChange={e => set("color", e.target.value)} style={{ opacity:0, position:"absolute", width:1, height:1, pointerEvents:"none" }} />
                {PALETTE.indexOf(form.color) !== -1 && <span style={{ fontSize:13, color:C.l3, lineHeight:1 }}>+</span>}
              </label>
            </div>
          </div>

          {/* Subtasks (projects only) */}
          {form.type === "project" && (
            <div style={{ marginBottom:14 }}>
              <span style={lbl}>Sotto-attività ({form.subtasks.length})</span>
              <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                <input style={inp(C,{ flex:1 })} value={subIn} placeholder="Aggiungi voce…" onChange={e => setSubIn(e.target.value)} onKeyDown={e => e.key === "Enter" && addSubField()} />
                <button onClick={addSubField} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, width:42, cursor:"pointer", fontSize:20, fontWeight:300, flexShrink:0 }}>+</button>
              </div>
              {form.subtasks.length > 0 && (
                <div style={{ background:C.s2, borderRadius:12, overflow:"hidden" }}>
                  {form.subtasks.map(function(s, idx) {
                    return (
                      <div key={s.id} style={{ display:"flex", alignItems:"center", padding:"10px 14px", borderBottom:idx < form.subtasks.length-1 ? `1px solid ${C.sep}` : "none", gap:10 }}>
                        <span style={{ flex:1, fontSize:14, color:C.l1 }}>{s.label}</span>
                        <button onClick={() => set("subtasks", form.subtasks.filter(function(x){ return x.id !== s.id; }))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:18, opacity:0.7, padding:0 }}>−</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Notes */}
          <div style={{ marginBottom:14 }}>
            <span style={lbl}>Note</span>
            <input style={inp(C)} value={form.description} placeholder="Contesto, link, riferimenti…" onChange={e => set("description", e.target.value)} />
          </div>

          {/* Waiting */}
          <div style={{ marginBottom:18, background:form.waiting ? `${C.teal}12` : C.s2, borderRadius:12, padding:"12px 14px", border:"1.5px solid "+(form.waiting ? `${C.teal}50` : "transparent"), transition:"all 0.2s" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:form.waiting ? 10 : 0 }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:6, color:form.waiting ? C.teal : C.l1 }}>
                  <Icon name="pause" size={13} color="currentColor"/>
                  <div style={{ fontSize:13, fontWeight:600 }}>In attesa di qualcuno</div>
                </div>
                <div style={{ fontSize:11, color:C.l3, marginTop:2 }}>Non dipende da te — tocca ad altri muoversi</div>
              </div>
              <div onClick={() => setForm(f => ({ ...f, waiting:!f.waiting, waitingSince:!f.waiting ? today : "" }))}
                style={{ width:40, height:24, borderRadius:12, background:form.waiting ? C.teal : C.s3, cursor:"pointer", position:"relative", transition:"background 0.2s", flexShrink:0 }}>
                <div style={{ width:18, height:18, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left:form.waiting ? 19 : 3, transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }} />
              </div>
            </div>
            {form.waiting && (
              <input style={inp(C, { fontSize:13, padding:"9px 12px" })} value={form.waitingFor} placeholder="Chi? Es. Marco, Studio legale, Cliente X…" onChange={e => set("waitingFor", e.target.value)} />
            )}
          </div>
        </>
      )}

      {/* Save */}
      <button onClick={handleSave} style={{ width:"100%", padding:"13px", borderRadius:12, border:"none", background:ok ? C.blue : C.s3, color:ok ? "#fff" : C.l3, cursor:ok ? "pointer" : "default", fontSize:15, fontWeight:600, transition:"all 0.2s" }}>
        {isEdit ? "Salva modifiche" : "Aggiungi task"}
      </button>

    </Sheet>
  );
}

function SuggestionWhisper({ suggestions }) {
  const C = useContext(ThemeCtx);
  const [idx, setIdx] = useState(0);
  const [dismissed, setDismissed] = useState(() => {
    try { return localStorage.getItem("tm_v1_whisper_dismissed") === today; } catch { return false; }
  });

  function dismiss() {
    try { localStorage.setItem("tm_v1_whisper_dismissed", today); } catch {}
    setDismissed(true);
  }

  if (!suggestions.length || dismissed) return null;
  const s = suggestions[Math.min(idx, suggestions.length-1)];
  return (
    <div style={{ background:C.s1, borderRadius:12, padding:"11px 14px", marginBottom:16, display:"flex", alignItems:"center", gap:12, border:`1px solid ${C.sep}` }}>
      <span style={{ display:"flex", alignItems:"center", flexShrink:0, color: s.icon === "warning" ? C.orange : C.l3 }}><Icon name={s.icon} size={14} color="currentColor"/></span>
      <span style={{ flex:1, fontSize:13, color:C.l2, lineHeight:1.45 }}>{s.text}</span>
      <div style={{ display:"flex", gap:4, alignItems:"center", flexShrink:0 }}>
        {suggestions.length > 1 && (
          <>
            <button onClick={() => setIdx(i => (i-1+suggestions.length)%suggestions.length)} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:16, padding:"2px 5px" }}>‹</button>
            <span style={{ fontSize:11, color:C.l3 }}>{idx+1}/{suggestions.length}</span>
            <button onClick={() => setIdx(i => (i+1)%suggestions.length)} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:16, padding:"2px 5px" }}>›</button>
          </>
        )}
        <button onClick={dismiss} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:14, padding:"2px 8px", marginLeft:4 }}>✕</button>
      </div>
    </div>
  );
}

function QuickCapture({ onAdd }) {
  const C = useContext(ThemeCtx);
  const [val, setVal]       = useState("");
  const [active, setActive] = useState(false);
  const [flash, setFlash]   = useState(false);

  function submit() {
    const t = val.trim();
    if (!t) return;
    onAdd(t);
    setVal("");
    setActive(false);
    setFlash(true);
    setTimeout(() => setFlash(false), 600);
  }

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ display:"flex", gap:10, alignItems:"center", background:flash ? `${C.green}18` : active ? C.s2 : C.s1, borderRadius:12, padding:"11px 16px", border:`1px solid ${flash ? `${C.green}60` : active ? `${C.blue}50` : C.sep}`, transition:"all 0.3s" }}>
        <span style={{ fontSize:20, color:flash ? C.green : active ? C.blue : C.l3, transition:"color 0.3s", flexShrink:0 }}>{flash ? "✓" : "+"}</span>
        <input
          value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") { setVal(""); setActive(false); } }}
          onFocus={() => setActive(true)}
          onBlur={() => setActive(false)}
          placeholder="Cattura un pensiero…"
          style={{ flex:1, background:"none", border:"none", outline:"none", color:C.l1, fontSize:15, fontFamily:"inherit" }}
        />
        {val && (
          <>
            <button onClick={() => { setVal(""); setActive(false); }}
              style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:14, padding:"0 2px", flexShrink:0, lineHeight:1 }}>✕</button>
            <button onClick={submit} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:8, padding:"4px 12px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0 }}>↵</button>
          </>
        )}
      </div>
      {active && <div style={{ fontSize:11, color:C.l3, marginTop:5, paddingLeft:4 }}>↵ per catturare · Esc per annullare · Classifica dopo in Inbox</div>}
    </div>
  );
}

function AgendaRow({ task, isSelected, onSelect, onComplete, hzColor }) {
  const C       = useContext(ThemeCtx);
  const dL      = task.end ? workDiff(today, task.end) : null;
  const doneSubs = task.subtasks.filter(s => s.done).length;
  const nextSub  = task.subtasks.find(s => s.next && !s.done);
  const riskRaw  = getRisk(task);
  const risk     = riskRaw ? { ...riskRaw, color: C[riskRaw.colorKey] } : null;
  const escalated = isEscalated(task);
  const dur      = DURATION_MAP[task.duration];
  const isInbox  = task.type === "inbox";

  return (
    <div>
      <div className="agenda-row" onClick={onSelect}
        style={{ display:"flex", alignItems:"stretch", cursor:"pointer", background:isSelected ? C.s2 : "transparent", transition:"background 0.12s" }}>
        <div style={{ width:4, background:isInbox ? C.l3 : hzColor, flexShrink:0, borderRadius:"4px 0 0 4px", opacity:isInbox ? 0.2 : 1 }} />
        <div style={{ flex:1, display:"flex", alignItems:"center", padding:"10px 14px 10px 13px", gap:10 }}>

          {/* Completion circle */}
          <div onClick={e => { e.stopPropagation(); onComplete(task.id); }}
            title="Segna come completato"
            style={{ width:18, height:18, borderRadius:"50%", flexShrink:0, border:`1.5px solid ${isInbox ? C.l3 : hzColor}`, background:"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", opacity: isInbox ? 0.3 : 0.45, transition:"all 0.15s" }}
            onMouseEnter={e => { e.currentTarget.style.opacity="1"; e.currentTarget.style.background=hzColor+"30"; }}
            onMouseLeave={e => { e.currentTarget.style.opacity= isInbox ? "0.3" : "0.45"; e.currentTarget.style.background="transparent"; }}>
            <svg width="8" height="7" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke={isInbox ? C.l3 : hzColor} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>

          {/* Identity dot */}
          <div style={{ width:7, height:7, borderRadius:"50%", background:task.color, flexShrink:0 }} />

          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom: task.description ? 2 : 3, flexWrap:"wrap" }}>
              <span style={{ fontSize:15, fontWeight:600, color:isInbox ? C.l2 : task.waiting ? C.l2 : C.l1 }}>{task.title}</span>
              {isInbox && <span style={{ fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:6, background:`${C.yellow}2A`, color:C.yellow }}>inbox</span>}
              {task.waiting && <span style={{ fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:6, background:`${C.teal}22`, color:C.teal, display:"inline-flex", alignItems:"center", gap:3 }}><Icon name="pause" size={9} color="currentColor"/>in attesa</span>}
              {escalated && !isInbox && !task.waiting && (
                <span style={{ fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:6, background:(risk && risk.level==="critical") ? `${C.red}2A` : `${C.orange}2A`, color:(risk && risk.level==="critical") ? C.red : C.orange, display:"inline-flex", alignItems:"center", gap:3 }}>
                  <Icon name="warning" size={9} color="currentColor"/>
                  {(risk && risk.level==="critical") ? "rischio" : "in scadenza"}
                </span>
              )}
            </div>
            {task.description && (
              <div style={{ fontSize:12, color:C.l3, marginBottom:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", width:0, minWidth:"100%" }}>{task.description}</div>
            )}
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {dur && !isInbox && <span style={{ display:"flex", alignItems:"center", color:C.l3 }}><Icon name={dur.icon} size={11} color="currentColor" /></span>}
              {task.subtasks.length > 0 && <span style={{ fontSize:12, color:C.l3 }}>{doneSubs}/{task.subtasks.length} sottotask</span>}
              {task.attachments && task.attachments.length > 0 && (
                <span style={{ display:"flex", alignItems:"center", gap:3, fontSize:11, color:C.l3 }}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                  </svg>
                  {task.attachments.length}
                </span>
              )}
              {dL !== null && dL < 0 && <span style={{ fontSize:11, color:C.red, opacity:0.45 }}>· in ritardo di {Math.abs(dL)}g</span>}
              {risk && !isInbox && <span style={{ fontSize:11, color:risk.color }}>{risk.tip}</span>}
            </div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3, flexShrink:0 }}>
            {!isInbox && <span style={{ fontSize:13, fontWeight:600, color:task.color }}>{task.progress}%</span>}
            {dL !== null && <span style={{ fontSize:11, color:dL < 0 ? C.red : dL === 0 ? C.yellow : C.l3 }}>
              {dL < 0 ? `${Math.abs(dL)}gg fa` : dL === 0 ? "Oggi" : dL === 1 ? "Dom." : `${dL}gg lav.`}
            </span>}
          </div>
          {!isInbox && (
            <div style={{ width:3, height:34, background:C.s3, borderRadius:3, overflow:"hidden", flexShrink:0 }}>
              <div style={{ width:"100%", height:`${task.progress}%`, background:task.color, borderRadius:3, transition:"height 0.3s", marginTop:`${100-task.progress}%` }} />
            </div>
          )}
        </div>
      </div>
      {nextSub && (
        <div onClick={onSelect} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px 8px 36px", cursor:"pointer", background:isSelected ? C.s2 : "transparent" }}>
          <div style={{ width:3, background:hzColor, alignSelf:"stretch", borderRadius:3, flexShrink:0 }} />
          <div style={{ width:12, height:12, borderRadius:"50%", border:`1.5px solid ${task.color}`, flexShrink:0 }} />
          <span style={{ fontSize:13, color:C.l2, flex:1 }}>{nextSub.label}</span>
          <span style={{ fontSize:10, fontWeight:600, padding:"2px 7px", borderRadius:7, background:task.color+"22", color:task.color }}>→ Prossimo</span>
        </div>
      )}
    </div>
  );
}

function AttachmentViewer({ attachment, onClose }) {
  const C = useContext(ThemeCtx);
  const [url, setUrl] = useState(null);

  useEffect(() => {
    idbGet(attachment.id).then(rec => {
      if (rec) setUrl(URL.createObjectURL(rec.blob));
    });
    return () => { if (url) URL.revokeObjectURL(url); };
  }, [attachment.id]);

  const isImage = attachment.type.startsWith("image/");
  const isPDF   = attachment.type === "application/pdf";

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", backdropFilter:"blur(24px)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:500 }}>
      <div onClick={e => e.stopPropagation()} style={{ width:"90vw", maxWidth:900, height:"85vh", display:"flex", flexDirection:"column", gap:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
          <span style={{ fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.8)" }}>{attachment.name}</span>
          <div style={{ display:"flex", gap:8 }}>
            {url && (
              <a href={url} download={attachment.name}
                style={{ fontSize:12, color:"rgba(255,255,255,0.5)", background:"rgba(255,255,255,0.1)", borderRadius:8, padding:"5px 12px", textDecoration:"none", fontWeight:500 }}>
                Scarica
              </a>
            )}
            <button onClick={onClose} style={{ background:"rgba(255,255,255,0.12)", border:"none", color:"#fff", borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>✕</button>
          </div>
        </div>
        <div style={{ flex:1, borderRadius:14, overflow:"hidden", background:"rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          {!url ? (
            <span style={{ color:"rgba(255,255,255,0.3)", fontSize:13 }}>Caricamento…</span>
          ) : isImage ? (
            <img src={url} alt={attachment.name} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", borderRadius:8 }} />
          ) : isPDF ? (
            <iframe src={url} title={attachment.name} style={{ width:"100%", height:"100%", border:"none", borderRadius:8 }} />
          ) : (
            <div style={{ textAlign:"center", color:"rgba(255,255,255,0.4)" }}>
              <div style={{ fontSize:36, marginBottom:12 }}><Icon name="archive" size={36} color="currentColor"/></div>
              <div style={{ fontSize:13 }}>Anteprima non disponibile</div>
              <a href={url} download={attachment.name} style={{ fontSize:12, color:"#0A84FF", marginTop:8, display:"block" }}>Scarica il file</a>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AttachmentSection({ task, onAdd, onRemove }) {
  const C        = useContext(ThemeCtx);
  const fileRef  = useRef(null);
  const [viewing, setViewing]   = useState(null);
  const [loading, setLoading]   = useState(false);

  const fmtSize = bytes => bytes < 1024*1024
    ? `${(bytes/1024).toFixed(0)} KB`
    : `${(bytes/1024/1024).toFixed(1)} MB`;

  function handleFiles(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setLoading(true);
    let chain = Promise.resolve();
    files.forEach(file => {
      chain = chain.then(() => {
        const id   = `att_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const meta = { id, name:file.name, type:file.type, size:file.size, createdAt:new Date().toISOString() };
        return idbSave({ id, blob:file }).then(() => { onAdd(task.id, meta); });
      });
    });
    chain.then(() => { setLoading(false); e.target.value = ""; });
  }

  function handleRemove(att) {
    onRemove(task.id, att);
  }

  const iconFor = type => type.startsWith("image/") ? "blocks" : type === "application/pdf" ? "archive" : "dot-info";

  return (
    <div style={{ marginBottom:12 }}>
      <input ref={fileRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style={{ display:"none" }} onChange={handleFiles} />
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
        <span style={{ fontSize:12, fontWeight:500, color:C.l2 }}>Allegati</span>
        <button onClick={() => fileRef.current.click()}
          style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:C.blue, background:`${C.blue}18`, border:"none", borderRadius:7, padding:"3px 10px", cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>
          {loading ? "…" : <><Icon name="inbox" size={10} color="currentColor"/> Allega</>}
        </button>
      </div>
      {task.attachments.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {task.attachments.map(att => (
            <div key={att.id} style={{ display:"flex", alignItems:"center", gap:8, background:C.s2, borderRadius:9, padding:"7px 10px" }}>
              <span style={{ color:C.l3, flexShrink:0 }}><Icon name={iconFor(att.type)} size={12} color="currentColor"/></span>
              <button onClick={() => setViewing(att)}
                style={{ flex:1, background:"none", border:"none", textAlign:"left", cursor:"pointer", padding:0, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:500, color:C.l1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{att.name}</div>
                <div style={{ fontSize:10, color:C.l3 }}>{fmtSize(att.size)}</div>
              </button>
                <button onClick={() => handleRemove(att)}
                  style={{ background:"none", border:"none", color:C.red, cursor:"pointer", opacity:0.4, padding:"2px 4px", flexShrink:0, fontSize:14, lineHeight:1, fontFamily:"inherit" }}
                  onMouseEnter={e => e.currentTarget.style.opacity="1"}
                  onMouseLeave={e => e.currentTarget.style.opacity="0.4"}>
                  ✕
                </button>
            </div>
          ))}
        </div>
      )}
      {task.attachments.length === 0 && (
        <div style={{ fontSize:11, color:C.l3, textAlign:"center", padding:"10px 0" }}>Nessun allegato</div>
      )}
      {viewing && <AttachmentViewer attachment={viewing} onClose={() => setViewing(null)} />}
    </div>
  );
}

function DetailPanel({ task, onClose, onEdit, onDelete, onComplete, onUncomplete, onToggleSub, onAddSub, onDelSub, onSetNext, onUpdateProg, onToggleWaiting, onAddAttachment, onRemoveAttachment }) {
  const C      = useContext(ThemeCtx);
  const lbl    = slbl(C);
  const [subIn, setSubIn] = useState("");
  const dL     = task.end ? workDiff(today, task.end) : null;
  const doneSubs = task.subtasks.filter(s => s.done).length;
  const riskRaw = getRisk(task);
  const risk    = riskRaw ? { ...riskRaw, color: C[riskRaw.colorKey] } : null;
  const esc     = isEscalated(task);
  const compHz  = computeHz(task);
  const cell    = task.urgency && task.importance ? getCell(task.urgency, task.importance) : null;
  const dur     = DURATION_MAP[task.duration];

  function addSubPanel() {
    const l = subIn.trim();
    if (!l) return;
    onAddSub(task.id, l);
    setSubIn("");
  }

  return (
    <div style={{ width:300, background:C.s1, borderLeft:`1px solid ${C.sep}`, overflowY:"auto", padding:"20px 18px", animation:"panelIn 0.2s ease", flexShrink:0, display:"flex", flexDirection:"column", boxShadow:C.shadow ? `-4px 0 20px rgba(0,0,0,0.08)` : "none" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:task.color }} />
          {dur && <span style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:C.l3 }}><Icon name={dur.icon} size={11} color="currentColor"/>{dur.label}</span>}
        </div>
        <div style={{ display:"flex", gap:5 }}>
          {task.type !== "inbox" && !task.waiting && (
            <button onClick={() => onToggleWaiting(task.id)} title="Metti in attesa" style={{ background:C.s2, border:"none", color:C.l3, borderRadius:8, padding:"5px 8px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>
            </button>
          )}
          <button onClick={onEdit} style={{ background:task.type==="inbox" ? `${C.blue}22` : C.s2, border:"none", color:task.type==="inbox" ? C.blue : C.l2, borderRadius:8, padding:"5px 10px", cursor:"pointer", fontSize:12, fontWeight:task.type==="inbox" ? 600 : 500 }}>{task.type === "inbox" ? "Classifica →" : "Modifica"}</button>
          <button onClick={onClose} style={{ background:C.s2, border:"none", color:C.l2, borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>✕</button>
        </div>
      </div>

      <h2 style={{ margin:"0 0 4px", fontSize:18, fontWeight:700, color:C.l1, letterSpacing:-0.3, lineHeight:1.25 }}>{task.title}</h2>
      {task.description && (
        <div style={{ background:C.s2, borderRadius:10, padding:"10px 12px", marginBottom:12, maxHeight:140, overflowY:"auto" }}>
          <p style={{ margin:0, fontSize:13, color:C.l2, lineHeight:1.6, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{task.description}</p>
        </div>
      )}

      {task.waiting && (
        <div style={{ background:`${C.teal}12`, borderRadius:12, padding:"11px 14px", marginBottom:12, border:`1px solid ${C.teal}30` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:700, color:C.teal, marginBottom:3 }}><Icon name="pause" size={11} color="currentColor"/>In attesa</div>
              {task.waitingFor && <div style={{ fontSize:12, color:C.l2 }}>↳ {task.waitingFor}</div>}
              {task.waitingSince && <div style={{ fontSize:11, color:C.l3, marginTop:3 }}>da {workDiff(task.waitingSince, today)} gg lav.</div>}
            </div>
            <button onClick={() => onToggleWaiting(task.id)} style={{ fontSize:11, fontWeight:600, color:C.teal, background:`${C.teal}18`, border:"none", borderRadius:7, padding:"4px 10px", cursor:"pointer" }}>Sbloccato →</button>
          </div>
        </div>
      )}

      <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:12 }}>
        {HZ[compHz] && <span style={{ fontSize:11, fontWeight:600, padding:"3px 9px", borderRadius:20, background:hzColor(compHz,C)+"2A", color:hzColor(compHz,C) }}>{HZ[compHz].label}</span>}
        {cell && <span style={{ fontSize:11, fontWeight:600, padding:"3px 9px", borderRadius:20, background:cell.color+"2A", color:cell.color }}>{cell.label}</span>}
        {esc && <span style={{ fontSize:11, fontWeight:600, padding:"3px 9px", borderRadius:20, background:`${C.orange}2A`, color:C.orange }}>Escalato</span>}
      </div>

      {(risk || esc) && (
        <div style={{ background:((risk && risk.color) ? risk.color : C.orange)+"12", borderRadius:10, padding:"10px 12px", marginBottom:12, border:`1px solid ${((risk && risk.color) ? risk.color : C.orange)}25` }}>
          {risk && (
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:esc ? 4 : 0 }}>
              <span style={{ fontSize:12, fontWeight:600, color:risk.color }}>{risk.label}</span>
              <span style={{ fontSize:11, color:C.l3 }}>{risk.tip}</span>
            </div>
          )}
          {esc && cell && (
            <div style={{ fontSize:11, color:C.l3 }}>
              {(HZ[cell.hz] ? HZ[cell.hz].label : "")} → <span style={{ color:hzColor(compHz,C), fontWeight:600 }}>{HZ[compHz] ? HZ[compHz].label : ""}</span>
            </div>
          )}
        </div>
      )}

      {task.end && (
        <div style={{ background:C.s2, borderRadius:10, overflow:"hidden", marginBottom:12 }}>
          {[["Scadenza", fmtDate(task.end)], ["Giorni lav. rimasti", dL !== null ? (dL < 0 ? `${Math.abs(dL)}gg fa` : dL === 0 ? "Oggi" : `${dL} gg lav.`) : "—"]].map(([l,v],i,arr) => (
            <div key={l} style={{ display:"flex", justifyContent:"space-between", padding:"8px 12px", borderBottom:i < arr.length-1 ? `1px solid ${C.sep}` : "none" }}>
              <span style={{ fontSize:12, color:C.l3 }}>{l}</span>
              <span style={{ fontSize:12, fontWeight:500, color:dL !== null && dL < 0 && i === arr.length-1 ? C.red : C.l1 }}>{v}</span>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
          <span style={{ fontSize:12, color:C.l2, fontWeight:500 }}>Avanzamento</span>
          <span style={{ fontSize:12, fontWeight:600, color:task.color }}>{task.progress}%</span>
        </div>
        {task.subtasks.length === 0 ? (
          <div style={{ position:"relative", height:10, borderRadius:5, background:C.s3, overflow:"hidden", cursor:"pointer" }}
            onClick={e => {
              const rect = e.currentTarget.getBoundingClientRect();
              const pct  = Math.round((e.clientX - rect.left) / rect.width * 100);
              onUpdateProg(task.id, Math.min(100, Math.max(0, pct)));
            }}>
            <div style={{ height:"100%", width:`${task.progress}%`, background:task.color, borderRadius:5, transition:"width 0.15s" }} />
          </div>
        ) : (
          <>
            <div style={{ background:C.s3, borderRadius:5, height:6, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${task.progress}%`, background:task.color, borderRadius:5, transition:"width 0.3s" }} />
            </div>
            <div style={{ fontSize:11, color:C.l3, textAlign:"center", marginTop:4 }}>Calcolato dai sottotask</div>
          </>
        )}
      </div>

      <div style={{ marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
          <span style={{ fontSize:12, fontWeight:500, color:C.l2 }}>Sotto-attività</span>
          <span style={{ fontSize:11, color:C.l3 }}>{doneSubs}/{task.subtasks.length}</span>
        </div>
        {task.subtasks.length > 0 && (
          <div style={{ background:C.s2, borderRadius:10, overflow:"hidden", marginBottom:7 }}>
            {task.subtasks.map((s, idx) => (
              <div key={s.id} style={{ display:"flex", alignItems:"center", padding:"8px 11px", borderBottom:idx < task.subtasks.length-1 ? `1px solid ${C.sep}` : "none", gap:8 }}>
                <div onClick={() => onToggleSub(task.id, s.id)}
                  style={{ width:15, height:15, borderRadius:"50%", flexShrink:0, background:s.done ? task.color : "transparent", border:`1.5px solid ${s.done ? task.color : C.s3}`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", transition:"all 0.2s" }}>
                  {s.done && <svg width="8" height="7" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span onClick={() => onToggleSub(task.id, s.id)} style={{ flex:1, fontSize:13, color:s.done ? C.l3 : C.l1, textDecoration:s.done ? "line-through" : "none", cursor:"pointer" }}>{s.label}</span>
                {!s.done && (
                  <button onClick={() => onSetNext(task.id, s.id)}
                    style={{ background:s.next ? task.color+"22" : "none", border:`1px solid ${s.next ? task.color : C.s3}`, color:s.next ? task.color : C.l3, borderRadius:5, padding:"1px 6px", cursor:"pointer", fontSize:9, fontWeight:700, flexShrink:0 }}>
                    {s.next ? "→ next" : "→"}
                  </button>
                )}
                {task.type === "project" && (
                  <button onClick={() => onDelSub(task.id, s.id)}
                    style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:15, padding:0, opacity:0, transition:"opacity 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.opacity = "0.7"}
                    onMouseLeave={e => e.currentTarget.style.opacity = "0"}>−</button>
                )}
              </div>
            ))}
          </div>
        )}
        {task.type === "project" && (
          <div style={{ display:"flex", gap:6 }}>
            <input style={inp(C,{ flex:1, fontSize:13, padding:"8px 11px" })} value={subIn} placeholder="Aggiungi voce…" onChange={e => setSubIn(e.target.value)} onKeyDown={e => e.key === "Enter" && addSub()} />
            <button onClick={addSubPanel} style={{ background:C.s2, border:"none", color:C.blue, borderRadius:9, width:34, cursor:"pointer", fontSize:18, flexShrink:0 }}>+</button>
          </div>
        )}
      </div>

      <AttachmentSection task={task} onAdd={onAddAttachment} onRemove={onRemoveAttachment} />

      <div style={{ marginTop:"auto", paddingTop:8, display:"flex", flexDirection:"column", gap:6 }}>
        {task.progress < 100 ? (
          <button onClick={() => onComplete(task.id)} style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:`${C.green}18`, color:C.green, cursor:"pointer", fontSize:13, fontWeight:600 }}>✓ Segna come completato</button>
        ) : (
          <button onClick={() => onUncomplete(task.id)} style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:C.s2, color:C.l2, cursor:"pointer", fontSize:13, fontWeight:500 }}>↩ Riapri task</button>
        )}
        <button onClick={() => onDelete(task.id)} style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:"rgba(255,69,58,0.08)", color:C.red, cursor:"pointer", fontSize:13, fontWeight:500 }}>Elimina</button>
      </div>
    </div>
  );
}

function EndOfDayReview({ tasks, onClose, onDecide, onClassifyInbox }) {
  const C = useContext(ThemeCtx);
  const [decisions, setDecisions]       = useState({});  // task decisions
  const [inboxDec, setInboxDec]         = useState({});  // inbox decisions
  const [customDate, setCustomDate]     = useState({});
  const [classifying, setClassifying]   = useState(null); // inbox task being classified
  const [committed, setCommitted]       = useState(false);

  // Section 1 — task aperti oggi o scaduti
  const reviewItems = tasks.filter(t =>
    t.progress < 100 && !t.waiting && t.type !== "inbox" &&
    (computeHz(t) === "today" || (t.end && workDiff(today, t.end) < 0))
  );

  // Section 2 — inbox non elaborata
  const inboxItems = tasks.filter(t => t.type === "inbox" && t.progress < 100);

  const decidedTasks  = Object.keys(decisions).length;
  const decidedInbox  = Object.keys(inboxDec).length;
  const total         = reviewItems.length + inboxItems.length;
  const decided       = decidedTasks + decidedInbox;
  const allDone       = total > 0 && decided === total;
  const pct           = total ? Math.round(decided / total * 100) : 100;

  const decide      = (tid, choice) => setDecisions(d => ({ ...d, [tid]: choice }));
  const decideInbox = (tid, choice) => setInboxDec(d => ({ ...d, [tid]: choice }));

  // Called when user classifies an inbox task from within the review
  function handleInboxClassified(form) {
    onClassifyInbox(form);                       // update task in App state
    decideInbox(form.id, "classified");          // mark as decided in review
    setClassifying(null);
  }

  function commit() {
    // Apply task decisions
    reviewItems.forEach(t => {
      const d = decisions[t.id];
      if (!d) return;
      if (d === "done")                onDecide(t.id, "done",     null);
      else if (d === "tomorrow")       onDecide(t.id, "postpone", T(1));
      else if (d.startsWith("date:"))  onDecide(t.id, "postpone", d.replace("date:", ""));
      // "drop" → leave as-is, no call needed
    });
    setCommitted(true);
    setTimeout(onClose, 1800);
  }

  const now = new Date().toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });

  // ── Closing animation ──
  if (committed) return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div style={{ textAlign:"center", color:"#fff" }}>
        <div style={{ fontSize:52, marginBottom:16 }}>✦</div>
        <div style={{ fontSize:22, fontWeight:700, letterSpacing:-0.5 }}>Giornata chiusa.</div>
        <div style={{ fontSize:14, color:"rgba(255,255,255,0.5)", marginTop:8 }}>La mente è libera. A domani.</div>
      </div>
    </div>
  );

  // ── Empty state ──
  if (total === 0) return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.s1, borderRadius:24, padding:"36px 40px", maxWidth:400, width:"90vw", textAlign:"center", boxShadow:"0 32px 80px rgba(0,0,0,0.5)" }}>
        <div style={{ fontSize:40, marginBottom:16 }}>✦</div>
        <div style={{ fontSize:20, fontWeight:700, color:C.l1 }}>Niente da chiudere.</div>
        <div style={{ fontSize:14, color:C.l3, marginTop:8, marginBottom:24 }}>Agenda vuota, inbox pulita. Ottimo lavoro.</div>
        <button onClick={onClose} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:12, padding:"11px 28px", fontWeight:600, fontSize:15, cursor:"pointer" }}>Chiudi</button>
      </div>
    </div>
  );

  // ── Classification sub-form (renders on top of review) ──
  if (classifying) return (
    <TaskForm
      initial={{ ...classifying }}
      onSave={handleInboxClassified}
      onClose={() => setClassifying(null)}
    />
  );

  // ── Section label helper ──
  const SectionLabel = ({ color, label, count }) => (
    <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10 }}>
      <div style={{ width:5, height:5, borderRadius:"50%", background:color, flexShrink:0 }} />
      <span style={{ fontSize:11, fontWeight:700, color, letterSpacing:1.1 }}>{label.toUpperCase()}</span>
      <span style={{ fontSize:12, color:C.l3 }}>{count}</span>
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(24px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div onClick={e => e.stopPropagation()} style={{ background:C.s1, borderRadius:24, padding:"28px 28px 24px", width:540, maxWidth:"95vw", maxHeight:"88vh", display:"flex", flexDirection:"column", boxShadow:"0 32px 80px rgba(0,0,0,0.5)" }}>

        {/* Header */}
        <div style={{ marginBottom:20, flexShrink:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontSize:18, fontWeight:700, color:C.l1, letterSpacing:-0.3 }}>Chiusura giornata</div>
              <div style={{ fontSize:12, color:C.l3, marginTop:3 }}>{now} · {total} voci da sistemare</div>
            </div>
            <button onClick={onClose} style={{ background:C.s3, border:"none", color:C.l2, borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0 }}>✕</button>
          </div>
          <div style={{ marginTop:14, background:C.s3, borderRadius:4, height:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:C.green, borderRadius:4, transition:"width 0.4s" }} />
          </div>
          <div style={{ fontSize:11, color:C.l3, marginTop:5 }}>{decided} di {total} decisi</div>
        </div>

        {/* Scrollable body */}
        <div style={{ overflowY:"auto", flex:1, display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>

          {/* ── Sezione 1: Task aperti ── */}
          {reviewItems.length > 0 && (
            <>
              <SectionLabel color={C.red} label="Task aperti" count={reviewItems.length} />
              {reviewItems.map(t => {
                const dec = decisions[t.id];
                const dL  = t.end ? workDiff(today, t.end) : null;
                const isOverdue = dL !== null && dL < 0;
                return (
                  <div key={t.id} style={{ background:C.s2, borderRadius:14, padding:"13px 14px", border:`1.5px solid ${dec ? `${C.green}40` : "transparent"}`, transition:"all 0.2s", opacity:dec ? 0.7 : 1, marginBottom:2 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:dec ? 0 : 10 }}>
                      <div style={{ width:7, height:7, borderRadius:"50%", background:t.color, flexShrink:0 }} />
                      <span style={{ fontSize:14, fontWeight:600, color:C.l1, flex:1, lineHeight:1.3 }}>{t.title}</span>
                      {isOverdue && <span style={{ fontSize:10, color:C.red, fontWeight:600 }}>scaduto</span>}
                    </div>
                    {!dec ? (
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                        <button onClick={() => decide(t.id, "done")} style={{ padding:"6px 13px", borderRadius:9, border:"none", background:`${C.green}22`, color:C.green, cursor:"pointer", fontSize:12, fontWeight:600 }}>✓ Fatto</button>
                        <button onClick={() => decide(t.id, "tomorrow")} style={{ padding:"6px 13px", borderRadius:9, border:"none", background:`${C.blue}22`, color:C.blue, cursor:"pointer", fontSize:12, fontWeight:600 }}>→ Domani</button>
                        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                          <input type="date" value={customDate[t.id] || ""} min={T(2)}
                            onChange={e => setCustomDate(d => ({ ...d, [t.id]: e.target.value }))}
                            style={{ background:C.s3, border:"none", borderRadius:9, padding:"6px 10px", color:C.l2, fontSize:12, colorScheme: C === LIGHT ? "light" : "dark", fontFamily:"inherit", cursor:"pointer" }} />
                          {customDate[t.id] && (
                            <button onClick={() => decide(t.id, `date:${customDate[t.id]}`)} style={{ padding:"6px 10px", borderRadius:9, border:"none", background:`${C.orange}22`, color:C.orange, cursor:"pointer", fontSize:12, fontWeight:600 }}>OK</button>
                          )}
                        </div>
                        <button onClick={() => decide(t.id, "drop")} style={{ padding:"6px 13px", borderRadius:9, border:"none", background:"transparent", color:C.l3, cursor:"pointer", fontSize:12, marginLeft:"auto" }}>Lascia stare</button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                        <span style={{ fontSize:12, color:C.l3 }}>
                          {dec === "done" ? "✓ Segnato completato" :
                           dec === "tomorrow" ? "→ Spostato a domani" :
                           dec === "drop" ? "Lasciato in lista" :
                           `→ ${fmtDate(dec.replace("date:", ""))}`}
                        </span>
                        <button onClick={() => setDecisions(d => { const n={...d}; delete n[t.id]; return n; })} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:11 }}>annulla</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          )}

          {/* ── Separatore ── */}
          {reviewItems.length > 0 && inboxItems.length > 0 && (
            <div style={{ height:1, background:C.sep, margin:"8px 0" }} />
          )}

          {/* ── Sezione 2: Inbox ── */}
          {inboxItems.length > 0 && (
            <>
              <SectionLabel color={C.yellow} label="Inbox da elaborare" count={inboxItems.length} />
              {inboxItems.map(t => {
                const dec = inboxDec[t.id];
                return (
                  <div key={t.id} style={{ background:C.s2, borderRadius:14, padding:"13px 14px", border:`1.5px solid ${dec ? `${C.green}40` : "transparent"}`, transition:"all 0.2s", opacity:dec ? 0.7 : 1, marginBottom:2 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:dec ? 0 : 10 }}>
                      <div style={{ width:7, height:7, borderRadius:"50%", background:C.yellow, flexShrink:0 }} />
                      <span style={{ fontSize:14, fontWeight:600, color:C.l1, flex:1, lineHeight:1.3 }}>{t.title}</span>
                      <span style={{ fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:6, background:`${C.yellow}2A`, color:C.yellow }}>inbox</span>
                    </div>
                    {!dec ? (
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => setClassifying(t)}
                          style={{ padding:"6px 14px", borderRadius:9, border:"none", background:`${C.blue}22`, color:C.blue, cursor:"pointer", fontSize:12, fontWeight:600 }}>
                          Classifica →
                        </button>
                        <button onClick={() => decideInbox(t.id, "tomorrow")}
                          style={{ padding:"6px 13px", borderRadius:9, border:"none", background:"transparent", color:C.l3, cursor:"pointer", fontSize:12, marginLeft:"auto" }}>
                          Lascia in inbox
                        </button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                        <span style={{ fontSize:12, color:C.l3 }}>
                          {dec === "classified" ? "✓ Classificato" : "Lasciato in inbox"}
                        </span>
                        <button onClick={() => setInboxDec(d => { const n={...d}; delete n[t.id]; return n; })} style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", fontSize:11 }}>annulla</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          )}
        </div>

        {/* Commit */}
        <button onClick={commit} disabled={!allDone}
          style={{ width:"100%", padding:"13px", borderRadius:14, border:"none", background:allDone ? C.green : C.s3, color:allDone ? "#fff" : C.l3, cursor:allDone ? "pointer" : "default", fontSize:15, fontWeight:700, transition:"all 0.25s", letterSpacing:-0.2, flexShrink:0 }}>
          {allDone ? "Chiudi la giornata →" : `Decidi tutto (${total - decided} ${total - decided === 1 ? "rimasto" : "rimasti"})`}
        </button>
      </div>
    </div>
  );
}

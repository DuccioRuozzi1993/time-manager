                  <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:t.color, flexShrink:0 }} />
                    <span style={{ fontSize:14, fontWeight:600, color:C.l1, flex:1, lineHeight:1.3 }}>{t.title}</span>
                    {dL !== null && <span style={{ fontSize:11, color: dL <= 0 ? C.red : C.l3, flexShrink:0 }}>{dL < 0 ? `${Math.abs(dL)}gg fa` : dL === 0 ? "Oggi" : `${dL}gg lav.`}</span>}
                  </div>
                  {t.subtasks.length > 0 && (
                    <div style={{ fontSize:12, color:C.l3, marginTop:5, paddingLeft:17 }}>{doneSubs}/{t.subtasks.length} sottotask</div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function FocusMode({ task, onExit, onComplete, onUncomplete, onToggleSub, onUpdateProg, onPostpone }) {
  const C = useContext(ThemeCtx);
  const dL = task.end ? workDiff(today, task.end) : null;
  const doneSubs = task.subtasks.filter(s => s.done).length;
  const isComplete = task.progress >= 100;

  // ── Timer state — basato su timestamp assoluto, immune al throttling del browser ──
  const [timerTotal,   setTimerTotal]   = useState(0);   // durata totale in secondi
  const [timerLeft,    setTimerLeft]    = useState(0);   // secondi rimanenti (derivati)
  const [timerRunning, setTimerRunning] = useState(false);
  const [endTime,      setEndTime]      = useState(null); // timestamp ms di fine
  const [pausedLeft,   setPausedLeft]   = useState(0);   // secondi rimasti al momento della pausa
  const [customMin,    setCustomMin]    = useState("");
  const intervalRef = useRef(null);

  // Tick: ricalcola timerLeft da endTime reale — corretto anche dopo background
  useEffect(() => {
    if (timerRunning && endTime) {
      function tick() {
        const left = Math.max(0, Math.round((endTime - Date.now()) / 1000));
        setTimerLeft(left);
        if (left === 0) {
          setTimerRunning(false);
          setEndTime(null);
          clearInterval(intervalRef.current);
        }
      }
      tick(); // immediato al mount/resume
      intervalRef.current = setInterval(tick, 500); // 500ms per non perdere il secondo
    }
    return () => clearInterval(intervalRef.current);
  }, [timerRunning, endTime]);

  // Spazio = pausa/riprendi timer (via CustomEvent dall'handler globale)
  useEffect(() => {
    function onToggle() { if (timerTotal > 0 && !timerExpired) togglePause(); }
    document.addEventListener("focus-toggle-timer", onToggle);
    return () => document.removeEventListener("focus-toggle-timer", onToggle);
  }, [timerTotal, timerExpired, timerRunning]);

  function startTimer(minutes) {
    const secs = minutes * 60;
    const end  = Date.now() + secs * 1000;
    setTimerTotal(secs);
    setTimerLeft(secs);
    setEndTime(end);
    setPausedLeft(0);
    setTimerRunning(true);
  }
  function resetTimer() {
    clearInterval(intervalRef.current);
    setTimerTotal(0); setTimerLeft(0); setTimerRunning(false);
    setEndTime(null); setPausedLeft(0); setCustomMin("");
  }
  function togglePause() {
    if (timerRunning) {
      // Pausing: memorizza i secondi rimasti
      const left = Math.max(0, Math.round((endTime - Date.now()) / 1000));
      setPausedLeft(left);
      setTimerLeft(left);
      setTimerRunning(false);
      setEndTime(null);
    } else {
      // Resuming: ricrea endTime dal tempo rimasto
      const end = Date.now() + (pausedLeft || timerLeft) * 1000;
      setEndTime(end);
      setTimerRunning(true);
    }
  }

  const fmtTime = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
  const timerPct = timerTotal > 0 ? timerLeft / timerTotal : 1;
  const timerExpired = timerTotal > 0 && timerLeft === 0;

  // SVG ring geometry
  const R = 88; const CIRC = 2 * Math.PI * R;
  const ringColor = timerExpired ? C.l3 : timerLeft < 60 ? C.orange : C.blue;

  // ── Auto-exit on complete ──
  useEffect(() => {
    if (task.progress >= 100) {
      const t = setTimeout(onExit, 900);
      return () => clearTimeout(t);
    }
  }, [task.progress]);

  if (isComplete) return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:150, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
      <div style={{ fontSize:48 }}>✦</div>
      <div style={{ fontSize:22, fontWeight:700, color:C.l1, letterSpacing:-0.5 }}>Completato.</div>
      <div style={{ fontSize:14, color:C.l3 }}>{task.title}</div>
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:150, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", overflowY:"auto", animation:"focusIn 0.3s ease" }}>
      <style>{`@keyframes focusIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}`}</style>

      {/* Top bar */}
      <div style={{ position:"absolute", top:20, left:24, right:24, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          <span style={{ fontSize:11, fontWeight:700, color:C.blue, letterSpacing:1 }}>FOCUS</span>
        </div>
        <button onClick={onExit}
          style={{ background:"none", border:`1px solid ${C.sep}`, color:C.l3, borderRadius:10, padding:"7px 14px", cursor:"pointer", fontSize:12, fontWeight:500, fontFamily:"inherit", display:"flex", alignItems:"center", gap:6 }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Esci dal focus
        </button>
      </div>

      <div style={{ width:"100%", maxWidth:500, display:"flex", flexDirection:"column", gap:24, alignItems:"center" }}>

        {/* ── Timer ── */}
        {timerTotal === 0 ? (
          /* Setup */
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:12, color:C.l3, marginBottom:12, fontWeight:500, letterSpacing:0.5 }}>IMPOSTA UN TIMER <span style={{ opacity:0.5 }}>· opzionale</span></div>
            <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap" }}>
              {[15, 25, 50].map(m => (
                <button key={m} onClick={() => startTimer(m)}
                  style={{ padding:"9px 20px", borderRadius:12, border:`1px solid ${C.sep}`, background:C.s2, color:C.l1, cursor:"pointer", fontSize:14, fontWeight:600, fontFamily:"inherit", transition:"all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.background = C.s3; e.currentTarget.style.borderColor = C.blue+"80"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = C.s2; e.currentTarget.style.borderColor = C.sep; }}>
                  {m} min
                </button>
              ))}
              <div style={{ display:"flex", alignItems:"center", gap:6, background:C.s2, borderRadius:12, border:`1px solid ${C.sep}`, padding:"4px 4px 4px 14px" }}>
                <input
                  type="number" min="1" max="180" value={customMin}
                  onChange={e => setCustomMin(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && +customMin > 0) startTimer(+customMin); }}
                  placeholder="···"
                  style={{ width:38, background:"none", border:"none", outline:"none", fontSize:14, color:C.l1, fontFamily:"inherit", textAlign:"center" }}
                />
                <button onClick={() => +customMin > 0 && startTimer(+customMin)}
                  style={{ background: +customMin > 0 ? C.blue : C.s3, border:"none", color: +customMin > 0 ? "#fff" : C.l3, borderRadius:9, padding:"6px 12px", cursor: +customMin > 0 ? "pointer" : "default", fontSize:12, fontWeight:600, fontFamily:"inherit", transition:"all 0.15s" }}>
                  via
                </button>
              </div>
            </div>
          </div>
        ) : (
          /* Running / expired */
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14 }}>
            {/* SVG ring */}
            <div style={{ position:"relative", width:200, height:200 }}>
              <svg width="200" height="200" style={{ transform:"rotate(-90deg)" }}>
                {/* Track */}
                <circle cx="100" cy="100" r={R} fill="none" stroke={C.s3} strokeWidth="6" />
                {/* Progress */}
                <circle cx="100" cy="100" r={R} fill="none"
                  stroke={ringColor} strokeWidth="6"
                  strokeLinecap="round"
                  strokeDasharray={CIRC}
                  strokeDashoffset={CIRC * (1 - timerPct)}
                  style={{ transition:"stroke-dashoffset 1s linear, stroke 0.5s" }}
                />
              </svg>
              {/* Center content */}
              <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4 }}>
                <div style={{ fontSize:42, fontWeight:300, color: timerExpired ? C.l3 : C.l1, letterSpacing:-1, fontVariantNumeric:"tabular-nums", lineHeight:1 }}>
                  {fmtTime(timerLeft)}
                </div>
                <div style={{ fontSize:11, color:C.l3 }}>
                  {timerExpired ? "tempo scaduto" : timerRunning ? "in corso" : "in pausa"}
                </div>
              </div>
            </div>
            {/* Timer controls */}
            <div style={{ display:"flex", gap:8 }}>
              {!timerExpired && (
                <button onClick={togglePause}
                  style={{ padding:"7px 18px", borderRadius:10, border:`1px solid ${C.sep}`, background:"none", color:C.l2, cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit" }}>
                  {timerRunning ? "⏸ Pausa" : "▶ Riprendi"}
                </button>
              )}
              <button onClick={resetTimer}
                style={{ padding:"7px 18px", borderRadius:10, border:`1px solid ${C.sep}`, background:"none", color:C.l3, cursor:"pointer", fontSize:12, fontWeight:500, fontFamily:"inherit" }}>
                Azzera
              </button>
            </div>
          </div>
        )}

        {/* Task identity */}
        <div style={{ textAlign:"center", width:"100%" }}>
          <div style={{ width:10, height:10, borderRadius:"50%", background:task.color, margin:"0 auto 12px" }} />
          <h2 style={{ margin:0, fontSize:24, fontWeight:700, color:C.l1, letterSpacing:-0.5, lineHeight:1.3 }}>{task.title}</h2>
          {dL !== null && (
            <div style={{ marginTop:6, fontSize:13, color: dL < 0 ? C.red : dL === 0 ? C.yellow : C.l3 }}>
              {dL < 0 ? `Scaduto ${Math.abs(dL)} giorni fa` : dL === 0 ? "Scade oggi" : `${dL} giorni lavorativi alla scadenza`}
            </div>
          )}
        </div>

        {/* Progress — solo per task con sottotask */}
        {task.subtasks.length > 0 && (
        <div style={{ width:"100%" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
            <span style={{ fontSize:13, color:C.l2 }}>Avanzamento</span>
            <span style={{ fontSize:13, fontWeight:700, color:task.color }}>{task.progress}%</span>
          </div>
          <div style={{ background:C.s3, borderRadius:5, height:10, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${task.progress}%`, background:task.color, borderRadius:5, transition:"width 0.3s" }} />
          </div>
          <div style={{ fontSize:12, color:C.l3, textAlign:"center", marginTop:5 }}>{doneSubs} di {task.subtasks.length} completati</div>
        </div>
        )}

        {/* Subtasks */}
        {task.subtasks.length > 0 && (
          <div style={{ width:"100%", background:C.s1, borderRadius:16, overflow:"hidden", boxShadow:C.shadow }}>
            {task.subtasks.map((s, idx) => (
              <div key={s.id} onClick={() => onToggleSub(task.id, s.id)}
                style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", borderBottom: idx < task.subtasks.length-1 ? `1px solid ${C.sep}` : "none", cursor:"pointer", transition:"background 0.1s" }}
                onMouseEnter={e => { e.currentTarget.style.background = C.s2; }}
                onMouseLeave={e => { e.currentTarget.style.background = ""; }}>
                <div style={{ width:17, height:17, borderRadius:"50%", flexShrink:0, background:s.done ? task.color : "transparent", border:`1.5px solid ${s.done ? task.color : C.s3}`, display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s" }}>
                  {s.done && <svg width="9" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span style={{ fontSize:14, color: s.done ? C.l3 : C.l1, textDecoration: s.done ? "line-through" : "none", flex:1 }}>{s.label}</span>
              </div>
            ))}
          </div>
        )}

        {/* Actions */}
        <div style={{ display:"flex", gap:10, width:"100%" }}>
          <button onClick={() => onComplete(task.id)}
            style={{ flex:1, padding:"14px", borderRadius:14, border:"none", background:`${C.green}20`, color:C.green, cursor:"pointer", fontSize:15, fontWeight:700, fontFamily:"inherit", transition:"all 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.background = `${C.green}35`}
            onMouseLeave={e => e.currentTarget.style.background = `${C.green}20`}>
            ✓ Fatto
          </button>
          <button onClick={() => onPostpone(task.id)}
            style={{ padding:"14px 20px", borderRadius:14, border:`1px solid ${C.sep}`, background:"none", color:C.l3, cursor:"pointer", fontSize:14, fontWeight:500, fontFamily:"inherit", transition:"all 0.2s", whiteSpace:"nowrap" }}
            onMouseEnter={e => { e.currentTarget.style.color = C.l1; e.currentTarget.style.borderColor = C.l2; }}
            onMouseLeave={e => { e.currentTarget.style.color = C.l3; e.currentTarget.style.borderColor = C.sep; }}>
            → Domani
          </button>
        </div>

      </div>
    </div>
  );
}

function App() {
  // ── Persistence: load from localStorage on first render ──
  const [tasks, setTasks] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) return JSON.parse(raw).map(normalizeTask);
    } catch(e) {}
    return [];
  });

  const [trash, setTrash] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_TRASH);
      if (raw) return JSON.parse(raw).map(normalizeTask);
    } catch(e) {}
    return [];
  });

  const [attTrash, setAttTrash] = useState(() => {
    try {
      const raw = localStorage.getItem(LS_ATT_TRASH);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return [];
  });

  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem(LS_THEME) !== "light"; } catch(e) { return true; }
  });

  const [templates, setTemplates] = useState(() => {
    try { const r = localStorage.getItem(LS_TEMPLATES); return r ? JSON.parse(r) : []; } catch(e) { return []; }
  });
  useEffect(() => {
    try { localStorage.setItem(LS_TEMPLATES, JSON.stringify(templates)); } catch(e) {}
  }, [templates]);

  const saveTemplate     = useCallback(tpl => setTemplates(ts => [...ts, tpl]), []);
  const saveAllTemplates = useCallback(list => setTemplates(list), []);

  const [savedAt, setSavedAt] = useState(null);
  const [events, setEvents]   = useState(() => readEventLog());
  const [storageUsage, setStorageUsage] = useState(() => getStorageUsage());
  const [completionToast, setCompletionToast] = useState(null);
  const dayProgress = useDayProgress();
  const [busyHours, setBusyHours] = useState(function() {
    try {
      var raw = localStorage.getItem(LS_BUSY + "_" + today);
      return raw !== null ? parseFloat(raw) : 0;
    } catch(e) { return 0; }
  });
  useEffect(function() {
    try { localStorage.setItem(LS_BUSY + "_" + today, String(busyHours)); } catch(e) {}
  }, [busyHours]);

  // ── Persistence: save to localStorage on every change ──
  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(tasks)); setSavedAt(Date.now()); setStorageUsage(getStorageUsage()); } catch(e) {}
  }, [tasks]);

  useEffect(() => {
    try { localStorage.setItem(LS_TRASH, JSON.stringify(trash)); setSavedAt(Date.now()); setStorageUsage(getStorageUsage()); } catch(e) {}
  }, [trash]);

  useEffect(() => {
    try { localStorage.setItem(LS_ATT_TRASH, JSON.stringify(attTrash)); setSavedAt(Date.now()); setStorageUsage(getStorageUsage()); } catch(e) {}
  }, [attTrash]);

  useEffect(() => {
    try { localStorage.setItem(LS_THEME, isDark ? "dark" : "light"); } catch(e) {}
  }, [isDark]);

  const [sel, setSel]           = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [showReview, setShowReview] = useState(false);
  const [showTrash, setShowTrash]   = useState(false);
  const [showHelp, setShowHelp]     = useState(false);
  const [viewMode, setViewMode]     = useState("agenda");
  const [query, setQuery]           = useState("");
  const [focusTaskId, setFocusTaskId] = useState(null);
  const [showTemplates, setShowTemplates] = useState(false); // null | "picking" | task id
  const searchRef = useRef(null);
  const importRef = useRef(null);

  const C = isDark ? DARK : LIGHT;

  // ── Trash mutators ──
  const moveToTrash = useCallback(id => {
    appendEvent("trashed", id);
    setEvents(readEventLog());
    setTasks(ts => {
      const t = ts.find(t => t.id === id);
      if (!t) return ts;
      setTrash(tr => [...tr, { ...t, deletedAt: new Date().toISOString() }]);
      setSel(null);
      return ts.filter(t => t.id !== id);
    });
  }, []);
  const trashAll = useCallback(ids => {
    const now = new Date().toISOString();
    setTasks(ts => {
      const toMove = ts.filter(t => ids.includes(t.id));
      setTrash(tr => [...tr, ...toMove.map(t => ({ ...t, deletedAt: now }))]);
      return ts.filter(t => !ids.includes(t.id));
    });
  }, []);
  const restoreFromTrash = useCallback(id => {
    setTrash(tr => {
      const t = tr.find(t => t.id === id);
      if (!t) return tr;
      const { deletedAt, ...restored } = t;
      setTasks(ts => [...ts, restored]);
      return tr.filter(t => t.id !== id);
    });
  }, []);
  const deleteFromTrash = useCallback(id => {
    setTrash(tr => {
      const t = tr.find(t => t.id === id);
      if (t) (t.attachments || []).forEach(a => idbDelete(a.id));
      return tr.filter(t => t.id !== id);
    });
  }, []);
  const emptyTrash = useCallback(() => {
    setTrash(tr => { tr.forEach(t => (t.attachments || []).forEach(a => idbDelete(a.id))); return []; });
    setAttTrash(at => { at.forEach(a => idbDelete(a.id)); return []; });
  }, []);

  // Purge all completed tasks (progress >= 100) — frees localStorage space
  const purgeDone = useCallback(() => {
    setTasks(ts => {
      const done = ts.filter(t => t.progress >= 100);
      const now  = new Date().toISOString();
      setTrash(tr => [...tr, ...done.map(t => ({ ...t, deletedAt: now }))]);
      return ts.filter(t => t.progress < 100);
    });
  }, []);

  // ── Attachment trash mutators ──
  const trashAttachment = useCallback((taskId, taskTitle, meta) => {
    setTasks(ts => ts.map(t => t.id === taskId
      ? { ...t, attachments: t.attachments.filter(a => a.id !== meta.id) }
      : t
    ));
    setAttTrash(at => [...at, { ...meta, taskId, taskTitle, deletedAt: new Date().toISOString() }]);
  }, []);
  const restoreAttachment = useCallback(id => {
    setAttTrash(at => {
      const att = at.find(a => a.id === id);
      if (!att) return at;
      const { taskId, taskTitle, deletedAt, ...meta } = att;
      setTasks(ts => ts.map(t => t.id === taskId
        ? { ...t, attachments: [...(t.attachments || []), meta] }
        : t
      ));
      return at.filter(a => a.id !== id);
    });
  }, []);
  const deleteAttachment = useCallback(id => {
    idbDelete(id);
    setAttTrash(at => at.filter(a => a.id !== id));
  }, []);

  // ── Export / Import ──
  function exportJSON() {
    const blob = new Blob([JSON.stringify({ tasks, trash }, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `time-manager-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
    try { localStorage.setItem(LS_LAST_EXPORT, String(Date.now())); } catch {}
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        // Support both old format (array) and new format ({tasks, trash})
        const newTasks = Array.isArray(parsed) ? parsed : (parsed.tasks || []);
        const newTrash = Array.isArray(parsed) ? [] : (parsed.trash || []);
        if (!Array.isArray(newTasks)) throw new Error("Formato non valido");
        setTasks(newTasks.map(normalizeTask));
        setTrash(newTrash.map(normalizeTask));
        setSel(null);
      } catch(err) {
        alert("Errore nel file: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Computed groups ──
  const groups = useMemo(() => {
    const now       = Date.now();
    const active    = tasks.filter(t => t.progress < 100);
    // Snoozed = has snoozedUntil in the future (hide from all sections)
    const waiting    = active.filter(t => t.waiting && t.type !== "inbox" && !(t.snoozedUntil && t.snoozedUntil > now));
    const actionable = active.filter(t => !t.waiting && !(t.snoozedUntil && t.snoozedUntil > now));
    const inbox   = actionable.filter(t => t.type === "inbox");
    const today_  = smartSort(actionable.filter(t => t.type !== "inbox" && computeHz(t) === "today"));
    const week    = smartSort(actionable.filter(t => t.type !== "inbox" && computeHz(t) === "week"));
    const month   = smartSort(actionable.filter(t => t.type !== "inbox" && computeHz(t) === "month"));
    const backlog = smartSort(actionable.filter(t => t.type !== "inbox" && computeHz(t) === "backlog"));
    const done    = tasks.filter(t => t.progress >= 100);
    const load    = today_.reduce((s, t) => s + (DURATION_MAP[t.duration] ? DURATION_MAP[t.duration].hours : 0), 0);
    const projects = actionable.filter(t => t.subtasks && t.subtasks.length > 0);
    return { inbox, today: today_, week, month, backlog, done, load, projects, waiting };
  }, [tasks]);

  // Tick every 30s to make snoozed tasks reappear at the right time
  useEffect(() => {
    const id = setInterval(() => setTasks(ts => [...ts]), 30000);
    return () => clearInterval(id);
  }, []);

  const freeHours = Math.max(0, 8 - busyHours);

  const suggestions = useMemo(() => {
    const system = computeSuggestions({
      todayItems:   groups.today,
      inboxItems:   groups.inbox,
      projects:     groups.projects,
      backlogItems: groups.backlog,
      waitingItems: groups.waiting,
      load:         groups.load,
      freeHours:    freeHours,
    });
    const behavioral = computeBehavioralSuggestions(tasks, events);
    return [...behavioral, ...system];
  }, [groups, freeHours, tasks, events]);

  const handleWhisperAction = useCallback(act => {
    if (act.type === "trash") moveToTrash(act.taskId);
    // dismiss_postpone and dismiss_stale just close the suggestion (handled in SuggestionWhisper)
  }, [moveToTrash]);

  const selTask = tasks.find(t => t.id === sel);

  // ── Keyboard shortcuts ──
  useEffect(() => {
    function isTyping() {
      const tag = document.activeElement ? document.activeElement.tagName : "";
      return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" ||
             document.activeElement.isContentEditable;
    }
    function onKey(e) {
      // Cmd/Ctrl+K — cerca (sempre attivo)
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        if (searchRef.current) { searchRef.current.focus(); searchRef.current.select(); }
        return;
      }
      // Esc — chiudi tutto (sempre attivo)
      if (e.key === "Escape") {
        if (showHelp)    { setShowHelp(false);    return; }
        if (editTask)    { setEditTask(null);      return; }
        if (showForm)    { setShowForm(false);     return; }
        if (showReview)  { setShowReview(false);   return; }
        if (showTrash)   { setShowTrash(false);    return; }
        if (focusTaskId) { setFocusTaskId(null);   return; }
        if (query)       { setQuery("");           return; }
        if (sel)         { setSel(null);           return; }
        return;
      }
      // Scorciatoie lettera singola — disabilitate mentre si scrive
      if (isTyping()) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      // Focus mode shortcuts
      if (focusTaskId && focusTaskId !== "picking") {
        if (e.key === " ") { e.preventDefault(); document.dispatchEvent(new CustomEvent("focus-toggle-timer")); return; }
        return; // in focus mode blocco tutto il resto
      }

      switch (e.key) {
        case "n": case "N":
          e.preventDefault(); setShowForm(true); break;
        case "f": case "F":
          e.preventDefault(); setFocusTaskId("picking"); break;
        case "g": case "G":
          e.preventDefault(); setViewMode(v => v === "gantt" ? "agenda" : "gantt"); break;
        case "?":
          e.preventDefault(); setShowHelp(h => !h); break;
        case "e": case "E":
          if (sel) { e.preventDefault(); const t = tasks.find(t => t.id === sel); if (t) setEditTask({ ...t }); } break;
        case "Enter":
          if (sel) { e.preventDefault(); completeTask(sel); setSel(null); } break;
        case "Backspace": case "Delete":
          if (sel) { e.preventDefault(); moveToTrash(sel); } break;
        default: break;
      }
    }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [sel, query, showForm, editTask, showReview, showTrash, showHelp, focusTaskId, tasks]);

  const searchResults = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return null;
    return tasks.filter(t => {
      if (t.progress >= 100) return false;
      if (t.title.toLowerCase().includes(q)) return true;
      if (t.description && t.description.toLowerCase().includes(q)) return true;
      if (t.subtasks.some(s => s.label.toLowerCase().includes(q))) return true;
      if (t.waitingFor && t.waitingFor.toLowerCase().includes(q)) return true;
      return false;
    });
  }, [query, tasks]);

  // ── Mutators ──
  const logEvent = useCallback((type, taskId) => {
    appendEvent(type, taskId);
    setEvents(readEventLog());
  }, []);

  const deriveType = f => f.type === "inbox" ? "inbox" : f.subtasks && f.subtasks.length > 0 ? "project" : "action";
  const saveNew  = useCallback(f => {
    const id = Date.now();
    const t = { waiting:false, waitingFor:"", waitingSince:"", ...f, id };
    setTasks(ts => [...ts, { ...t, type:deriveType(t) }]);
    setShowForm(false);
    appendEvent("created", id);
    setEvents(readEventLog());
  }, []);
  const saveEdit = useCallback(f => {
    const prog = f.subtasks.length ? calcProg(f.subtasks) : f.progress;
    setTasks(ts => ts.map(t => t.id === f.id ? { ...f, progress:prog, type:deriveType(f) } : t));
    setEditTask(null);
  }, []);

  const addSub  = useCallback((tid, label) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = [...t.subtasks, { id:Date.now(), label, done:false }];
    return { ...t, subtasks:subs, progress:calcProg(subs), type:"project" };
  })), []);
  const delSub  = useCallback((tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = t.subtasks.filter(s => s.id !== sid);
    return { ...t, subtasks:subs, progress:calcProg(subs), type: subs.length > 0 ? "project" : "action" };
  })), []);
  const toggleSub = useCallback((tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const subs = t.subtasks.map(s => s.id === sid ? { ...s, done:!s.done } : s);
    return { ...t, subtasks:subs, progress:calcProg(subs) };
  })), []);
  const renameSub = useCallback((tid, sid, label) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    return { ...t, subtasks: t.subtasks.map(s => s.id === sid ? { ...s, label } : s) };
  })), []);
  const setNext = useCallback((tid, sid) => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const found   = t.subtasks.find(s => s.id === sid);
    const already = found ? found.next : false;
    return { ...t, subtasks:t.subtasks.map(s => ({ ...s, next:!already && s.id === sid })) };
  })), []);
  const updateProg     = useCallback((tid, v) => setTasks(ts => ts.map(t => t.id === tid && !t.subtasks.length ? { ...t, progress:v } : t)), []);
  const completeTask = useCallback(tid => {
    appendEvent("completed", tid);
    const newEvents = readEventLog();
    setEvents(newEvents);
    // Count completions today for toast
    const todayCount = newEvents.filter(e => e.type === "completed" && e.date === today).length;
    setTasks(ts => {
      const t = ts.find(t => t.id === tid);
      // Show toast with task title
      setCompletionToast({ id: Date.now(), count: todayCount, title: t ? t.title : null });
      if (t && t.recurrence && t.end) {
        const nextEnd   = nextRecurrenceDate(t.end, t.recurrence);
        const nextStart = nextEnd && t.start ? nextRecurrenceDate(t.start, t.recurrence) : nextEnd;
        const next = {
          ...t, id: Date.now() + 1, progress: 0,
          end: nextEnd || t.end, start: nextStart || t.start,
          subtasks: t.subtasks.map(s => ({ ...s, done:false, next:false })),
          pinned: false,
        };
        return [...ts.map(x => x.id === tid ? { ...x, progress:100 } : x), next];
      }
      return ts.map(x => x.id === tid ? { ...x, progress:100 } : x);
    });
  }, []);
  const uncompleteTask = useCallback(tid => setTasks(ts => ts.map(t => t.id === tid ? { ...t, progress:0 } : t)), []);
  const snoozeTask     = useCallback((tid, untilTs) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, snoozedUntil: untilTs } : t)), []);
  const postponeTask   = useCallback(tid => {
    appendEvent("postponed", tid);
    setEvents(readEventLog());
    setTasks(ts => ts.map(t => t.id === tid ? { ...t, end:T(1) } : t));
  }, []);

  const addAttachment    = useCallback((tid, meta) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, attachments:[...(t.attachments||[]), meta] } : t)), []);
  const removeAttachment = useCallback((taskId, meta) => {
    setTasks(ts => {
      const t = ts.find(t => t.id === taskId);
      trashAttachment(taskId, t ? t.title : "", meta);
      return ts;
    });
  }, [trashAttachment]);
  const toggleWaiting = useCallback(tid => setTasks(ts => ts.map(t => {
    if (t.id !== tid) return t;
    const nowWaiting = !t.waiting;
    return { ...t, waiting:nowWaiting, waitingSince:nowWaiting ? today : "", waitingFor:nowWaiting ? t.waitingFor : "" };
  })), []);
  const togglePin = useCallback(tid => setTasks(ts => ts.map(t => t.id === tid ? { ...t, pinned: !t.pinned } : t)), []);
  const quickAdd  = useCallback(title => setTasks(ts => [...ts, { ...EMPTY_TASK, id:Date.now(), title, type:"inbox", urgency:null, importance:null }]), []);
  const newEmpty  = useCallback(() => ({ ...EMPTY_TASK, start:today, color: PALETTE[Math.floor(Math.random() * PALETTE.length)] }), []);

  const handleReviewDecide = useCallback((tid, action, date) => {
    setTasks(ts => ts.map(t => {
      if (t.id !== tid) return t;
      if (action === "done")     return { ...t, progress:100 };
      if (action === "postpone") return { ...t, end:date };
      return t;
    }));
  }, []);

  // Called when user classifies an inbox task from within EndOfDayReview
  const handleClassifyInbox = useCallback(f => {
    const prog = f.subtasks.length ? calcProg(f.subtasks) : f.progress;
    const hz   = f.urgency && f.importance ? baseHz(f.urgency, f.importance) : "backlog";
    setTasks(ts => ts.map(t => t.id === f.id ? { ...f, progress:prog, horizon:hz } : t));
  }, []);

  return (
    <ThemeCtx.Provider value={C}>
    <div style={{ fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif", background:C.bg, minHeight:"100vh", color:C.l1, transition:"background 0.3s, color 0.3s" }}>
      <style>{`
        @keyframes panelIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${C.s3};border-radius:3px}
        input[type=date]::-webkit-calendar-picker-indicator{filter:${isDark ? "invert(0.5)" : "none"};cursor:pointer}
        input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:${C.s3};outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;margin-top:-6px}
        .agenda-row:hover{background:${C.s2}!important}
        .agenda-row:hover .pin-btn{opacity:0.35!important}
        .agenda-row:hover .pin-btn:hover{opacity:1!important}
      `}</style>

      {/* Header */}
      <div style={{ background:C.header, backdropFilter:"blur(20px)", borderBottom:`1px solid ${C.sep}`, padding:"14px 24px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:14 }}>
            <h1 style={{ margin:0, fontSize:20, fontWeight:700, letterSpacing:-0.5, color:C.l1 }}>Attività</h1>
            <div style={{ display:"flex", gap:10 }}>
              {groups.today.length > 0 && <span style={{ fontSize:13, color:C.red }}>{groups.today.length} oggi</span>}
              {groups.inbox.length > 0 && <span style={{ fontSize:13, color:C.yellow }}>{groups.inbox.length} inbox</span>}
              {groups.load > 0 && <span style={{ fontSize:13, color:groups.load > freeHours ? C.red : C.l3 }}>~{groups.load < 1 ? "<1" : Math.round(groups.load)}h/{freeHours}h libere</span>}
            </div>
            <SavedIndicator savedAt={savedAt} />
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            {/* Import (hidden input) */}
            <input ref={importRef} type="file" accept=".json" style={{ display:"none" }} onChange={importJSON} />

            {/* Busy hours input */}
            <div title="Ore già occupate oggi (riunioni, impegni fissi)" style={{ display:"flex", alignItems:"center", gap:5, background:C.s2, borderRadius:10, padding:"0 10px", height:34, border:`1px solid ${busyHours > 0 ? `${C.orange}60` : "transparent"}`, transition:"border-color 0.2s" }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={busyHours > 0 ? C.orange : C.l3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0 }}>
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <input
                type="number" min="0" max="8" step="0.5"
                value={busyHours || ""}
                onChange={function(e) {
                  var v = parseFloat(e.target.value);
                  setBusyHours(isNaN(v) ? 0 : Math.min(8, Math.max(0, v)));
                }}
                placeholder="0"
                title="Ore già occupate oggi"
                style={{ width:32, background:"none", border:"none", outline:"none", fontSize:13, color:busyHours > 0 ? C.orange : C.l2, fontFamily:"inherit", textAlign:"center", padding:0 }}
              />
              <span style={{ fontSize:11, color:C.l3, whiteSpace:"nowrap" }}>h occupate</span>
            </div>

            {/* Templates */}
            <button onClick={() => setShowTemplates(true)} title="Modelli di sottotask"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.l3, flexShrink:0 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>

            {/* Trash button */}
            <button onClick={() => setShowTrash(true)} title="Cestino"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:(trash.length + attTrash.length) > 0 ? C.red : C.l3, flexShrink:0, position:"relative" }}>
              <svg width="14" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
              {(trash.length + attTrash.length) > 0 && (
                <span style={{ position:"absolute", top:2, right:2, width:8, height:8, borderRadius:"50%", background:C.red, border:`1.5px solid ${C.bg}` }} />
              )}
            </button>

            {/* Import button */}
            <button onClick={() => importRef.current.click()} title="Importa backup JSON"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.l3, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </button>

            {/* Export button */}
            <button onClick={exportJSON} title="Esporta backup JSON"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:C.l3, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>

            {/* Search */}
            <div style={{ position:"relative", display:"flex", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", background:C.s2, borderRadius:10, border:`1px solid ${query ? `${C.blue}60` : "transparent"}`, transition:"all 0.2s", overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", paddingLeft:10, color:C.l3, flexShrink:0 }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                </div>
                <input
                  ref={searchRef}
                  value={query}
                  onChange={e => { setQuery(e.target.value); setSel(null); }}
                  onKeyDown={e => { if (e.key === "Escape") { setQuery(""); searchRef.current.blur(); } }}
                  placeholder="Cerca…"
                  style={{ background:"none", border:"none", outline:"none", fontSize:13, color:C.l1, padding:"7px 10px 7px 7px", width: query ? 180 : 90, transition:"width 0.25s", fontFamily:"inherit" }}
                />
                {query && (
                  <button onClick={() => { setQuery(""); searchRef.current.focus(); }}
                    style={{ background:"none", border:"none", color:C.l3, cursor:"pointer", padding:"0 8px 0 0", fontSize:14, lineHeight:1, display:"flex", alignItems:"center" }}>✕</button>
                )}
              </div>
            </div>

            {/* View tabs */}
            <div style={{ display:"flex", background:C.s2, borderRadius:10, padding:3, gap:2 }}>
              {[["agenda","Agenda"],["gantt","Gantt"]].map(function(pair) {
                var v = pair[0]; var label = pair[1];
                return (
                  <button key={v} onClick={() => setViewMode(v)}
                    style={{ background: viewMode === v ? C.s1 : "transparent", border:"none", borderRadius:7, padding:"5px 14px", cursor:"pointer", fontSize:12, fontWeight:600, color: viewMode === v ? C.l1 : C.l3, fontFamily:"inherit", transition:"all 0.15s", boxShadow: viewMode === v ? "0 1px 4px rgba(0,0,0,0.15)" : "none" }}>
                    {label}
                  </button>
                );
              })}
            </div>

            {/* Theme toggle */}
            <button onClick={() => setIsDark(d => !d)} title={isDark ? "Passa a light mode" : "Passa a dark mode"}
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color:C.l2, flexShrink:0 }}>
              {isDark ? (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
              ) : (
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              )}
            </button>

            {/* Help */}
            <button onClick={() => setShowHelp(true)} title="Scorciatoie da tastiera (?)"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color:C.l3, flexShrink:0, fontSize:14, fontWeight:600, fontFamily:"inherit" }}>
              ?
            </button>

            {/* Review */}
            <button onClick={() => setShowReview(true)} title="Chiusura giornata"
              style={{ background:"none", border:`1px solid ${C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color:C.l2, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </button>

            {/* Focus */}
            <button onClick={() => setFocusTaskId("picking")} title="Modalità focus"
              style={{ background: focusTaskId && focusTaskId !== "picking" ? `${C.blue}22` : "none", border:`1px solid ${focusTaskId && focusTaskId !== "picking" ? C.blue : C.sep}`, borderRadius:10, width:34, height:34, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.25s", color: focusTaskId && focusTaskId !== "picking" ? C.blue : C.l2, flexShrink:0 }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
              </svg>
            </button>

            <button onClick={() => setShowForm(true)} style={{ background:C.blue, border:"none", color:"#fff", borderRadius:10, padding:"8px 18px", fontWeight:600, fontSize:14, cursor:"pointer", letterSpacing:-0.2 }}>+ Nuovo</button>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", height:"calc(100vh - 57px)" }}>
        {searchResults ? (
          /* ── Search results ── */
          <div onClick={() => setSel(null)} style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>
            <div onClick={e => e.stopPropagation()}>
              <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:16 }}>
                <span style={{ fontSize:13, fontWeight:700, color:C.l1 }}>
                  {searchResults.length === 0 ? "Nessun risultato" : `${searchResults.length} risultat${searchResults.length === 1 ? "o" : "i"}`}
                </span>
                <span style={{ fontSize:12, color:C.l3 }}>per "{query}"</span>
              </div>
              {searchResults.length > 0 && (
                <div style={card(C)}>
                  {searchResults.map((task, idx) => {
                    const q = query.trim().toLowerCase();
                    const matchSubs = task.subtasks.filter(s => s.label.toLowerCase().includes(q));
                    const hz = computeHz(task);
                    const hzC = hzColor(hz, C);
                    return (
                      <div key={task.id} style={{ borderBottom: idx < searchResults.length-1 ? `1px solid ${C.sep}` : "none" }}>
                        <div style={{ display:"flex", alignItems:"stretch", cursor:"pointer", transition:"background 0.1s" }}
                          onClick={() => setSel(sel === task.id ? null : task.id)}
                          onMouseEnter={e => e.currentTarget.style.background = C.s2}
                          onMouseLeave={e => e.currentTarget.style.background = ""}>
                          {/* Hz color bar */}
                          <div style={{ width:4, background: task.type === "inbox" ? C.l3 : hzC, flexShrink:0, borderRadius:"4px 0 0 4px" }} />
                          <div style={{ flex:1, padding:"11px 14px" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom: matchSubs.length ? 5 : 0 }}>
                              <div style={{ width:7, height:7, borderRadius:"50%", background:task.color, flexShrink:0 }} />
                              <span style={{ fontSize:13, fontWeight:600, color:C.l1 }}>{task.title}</span>
                              <span style={{ fontSize:11, color:C.l3, marginLeft:"auto" }}>
                                {task.type === "inbox" ? "Inbox" : task.subtasks && task.subtasks.length > 0 ? "Progetto" : "Azione"}
                              </span>
                              {task.end && <span style={{ fontSize:11, color:C.l3 }}>→ {fmtDate(task.end)}</span>}
                            </div>
                            {task.description && task.description.toLowerCase().includes(q) && (
                              <div style={{ fontSize:11, color:C.l3, marginTop:3, paddingLeft:15, fontStyle:"italic" }}>
                                {task.description.slice(0, 100)}{task.description.length > 100 ? "…" : ""}
                              </div>
                            )}
                            {matchSubs.length > 0 && (
                              <div style={{ display:"flex", flexWrap:"wrap", gap:4, paddingLeft:15, marginTop:4 }}>
                                {matchSubs.map(s => (
                                  <span key={s.id} style={{ fontSize:10, color:C.l3, background:C.s3, borderRadius:5, padding:"2px 7px" }}>
                                    {s.done ? "✓ " : ""}{s.label}
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        ) : viewMode === "gantt" ? (
          <GanttView tasks={tasks} onSelect={id => setSel(sel === id ? null : id)} />
        ) : (
        <div onClick={() => setSel(null)} style={{ flex:1, overflowY:"auto", padding:"20px 24px 20px 28px", position:"relative" }}>
          <div onClick={e => e.stopPropagation()}>
            <QuickCapture onAdd={quickAdd} />
            <StorageWarning onExport={exportJSON} onPurgeDone={purgeDone} />
            <BackupReminder onExport={exportJSON} />
            <SuggestionWhisper suggestions={suggestions} onAction={handleWhisperAction} />
          </div>

          {groups.inbox.length > 0 && (
            <AgendaSection items={groups.inbox} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Inbox" color={C.yellow} onTogglePin={togglePin} />
          )}
          <AgendaSection items={groups.today} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask}
            label="Oggi" color={C.red} onTogglePin={togglePin} dayPct={dayProgress} onSnooze={snoozeTask}
            extra={groups.load > freeHours ? { text:`~${Math.round(groups.load)}h · overcommitment`, color:C.red } : groups.load > 0 ? { text:`~${groups.load < 1 ? "<1" : Math.round(groups.load)}h stimato`, color:C.l3 } : null} />
          <AgendaSection items={groups.week} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Questa settimana" color={C.orange} onTogglePin={togglePin} />
          <AgendaSection items={groups.month} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Prossime settimane" color={C.blue} onTogglePin={togglePin} />
          <AgendaSection items={groups.backlog} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="Backlog" color={C.l3} onTogglePin={togglePin} />
          {groups.waiting.length > 0 && (
            <AgendaSection items={groups.waiting} selected={sel} onSelect={id => setSel(sel===id?null:id)} onComplete={completeTask} label="In attesa" color={C.teal} onTogglePin={togglePin} />
          )}

          {groups.done.length > 0 && (
            <DoneSection done={groups.done} sel={sel} setSel={setSel} setTasks={setTasks} trashAll={trashAll} sep={C.sep} />
          )}

          {!groups.inbox.length && !groups.today.length && !groups.week.length && !groups.month.length && !groups.backlog.length && !groups.waiting.length && (
            <div style={{ textAlign:"center", padding:"60px 24px 80px", color:C.l3, userSelect:"none" }}>
              <div style={{ fontSize:36, marginBottom:16, opacity:0.4 }}>✦</div>
              <div style={{ fontSize:16, fontWeight:600, color:C.l2, marginBottom:8 }}>Nessun task ancora</div>
              <div style={{ fontSize:13, color:C.l3, lineHeight:1.6, maxWidth:280, margin:"0 auto 32px" }}>
                Cattura un pensiero nella barra qui sopra, oppure crea un task strutturato con <span style={{ color:C.blue, fontWeight:500 }}>+ Nuovo</span> in alto a destra.
              </div>
              {/* Arrow pointing up toward QuickCapture */}
              <svg width="24" height="48" viewBox="0 0 24 48" fill="none" style={{ margin:"0 auto", display:"block", opacity:0.3 }}>
                <line x1="12" y1="48" x2="12" y2="4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="4 4"/>
                <path d="M5 12L12 4L19 12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          )}

          <div style={{ textAlign:"center", padding:"28px 24px 20px", userSelect:"none" }}>
            <span style={{ fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif", fontStyle:"normal", fontWeight:300, fontSize:12, color:C.l3, opacity:0.4, letterSpacing:0.4 }}>
              Designed by Duccio Ruozzi and Claude in 2026
            </span>
          </div>
        </div>
        )} {/* end main view */}

        {selTask && (
          <DetailPanel task={selTask} onClose={() => setSel(null)}
            onEdit={() => setEditTask({ ...selTask })} onDelete={moveToTrash} onComplete={completeTask} onUncomplete={uncompleteTask}
            onToggleSub={toggleSub} onAddSub={addSub} onDelSub={delSub} onSetNext={setNext} onRenameSub={renameSub}
            onUpdateProg={updateProg} onToggleWaiting={toggleWaiting}
            onAddAttachment={addAttachment} onRemoveAttachment={removeAttachment} />
        )}
      </div>

      {showForm   && <TaskForm initial={newEmpty()} onSave={saveNew} onClose={() => setShowForm(false)} templates={templates} onSaveTemplate={saveTemplate} />}
      {editTask   && <TaskForm initial={editTask} onSave={saveEdit} onClose={() => setEditTask(null)} isEdit templates={templates} onSaveTemplate={saveTemplate} />}
      {showReview && <EndOfDayReview tasks={tasks} onClose={() => setShowReview(false)} onDecide={handleReviewDecide} onClassifyInbox={handleClassifyInbox} />}
      {showTrash  && <TrashModal trash={trash} attTrash={attTrash} onClose={() => setShowTrash(false)} onRestore={restoreFromTrash} onDeleteOne={deleteFromTrash} onRestoreAtt={restoreAttachment} onDeleteAtt={deleteAttachment} onEmpty={emptyTrash} />}
      {showHelp   && <HelpModal onClose={() => setShowHelp(false)} />}
      <CompletionToast toast={completionToast} />
      {showTemplates && <TemplatesModal templates={templates} onClose={() => setShowTemplates(false)} onSave={saveAllTemplates} />}
      {focusTaskId === "picking" && <FocusPicker tasks={tasks} onPick={id => setFocusTaskId(id)} onClose={() => setFocusTaskId(null)} />}
      {focusTaskId && focusTaskId !== "picking" && (() => {
        const ft = tasks.find(t => t.id === focusTaskId);
        if (!ft) { setFocusTaskId(null); return null; }
        return <FocusMode task={ft} onExit={() => setFocusTaskId(null)}
          onComplete={completeTask} onUncomplete={uncompleteTask}
          onToggleSub={toggleSub} onUpdateProg={updateProg} onPostpone={postponeTask} />;
      })()}
    </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
